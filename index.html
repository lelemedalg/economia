ito; (b) al saper svolgere attività diverse da quelle dei rivali o saper svolgere attività simili in modo diverso; (c) al saper svolgere attività simili a quelle dei concorrenti, ma in modo migliore rispetto a quanto essi facciano.","answerLetters":"c","specificNote":"Efficacia operativa = attività simili, svolte meglio. La (b) descrive il posizionamento strategico — è il distrattore speculare.","groupNote":"(1) Efficacia operativa = attività simili, svolte meglio. La (b) descrive il posizionamento strategico — è il distrattore speculare. (2) Fit di secondo e terzo tipo: le attività che si rinforzano a vicenda sono inimitabili come sistema. (3) \"Con limitato incremento dei costi\": la differenziazione deve rendere più di quanto costa. (4) Niente è permanente: l'unicità va continuamente rinnovata. (5) Influenzare senza possedere: il sistema del valore supera la logica proprietaria."},{"id":"c16","chapter":"I","chapterTitle":"Strategia e vantaggio competitivo","groupCode":"E2.4","groupTitle":"Porter: efficacia operativa, fit, differenziazione","difficulty":"Medium","qnum":"2","question":"Il vantaggio competitivo di un'impresa è maggiormente sostenibile se il sistema di attività si basa su fit: (a) di primo e secondo tipo; (b) di primo tipo; (c) di secondo e terzo tipo.","answerLetters":"c","specificNote":"Fit di secondo e terzo tipo: le attività che si rinforzano a vicenda sono inimitabili come sistema.","groupNote":"(1) Efficacia operativa = attività simili, svolte meglio. La (b) descrive il posizionamento strategico — è il distrattore speculare. (2) Fit di secondo e terzo tipo: le attività che si rinforzano a vicenda sono inimitabili come sistema. (3) \"Con limitato incremento dei costi\": la differenziazione deve rendere più di quanto costa. (4) Niente è permanente: l'unicità va continuamente rinnovata. (5) Influenzare senza possedere: il sistema del valore supera la logica proprietaria."},{"id":"c17","chapter":"I","chapterTitle":"Strategia e vantaggio competitivo","groupCode":"E2.4","groupTitle":"Porter: efficacia operativa, fit, differenziazione","difficulty":"Medium","qnum":"3","question":"Le imprese effettuano una strategia di differenziazione quando: (a) riescono a essere gli unici soggetti a fornire un determinato bene o servizio, distruggendo il potere dei prodotti sostitutivi; (b) riescono ad aumentare la propensione a pagare un prezzo superiore, con limitato incremento dei costi; (c) riescono ad aumentare la propensione a pagare un prezzo superiore, indipendentemente dall'incremento dei costi.","answerLetters":"b","specificNote":"\"Con limitato incremento dei costi\": la differenziazione deve rendere più di quanto costa.","groupNote":"(1) Efficacia operativa = attività simili, svolte meglio. La (b) descrive il posizionamento strategico — è il distrattore speculare. (2) Fit di secondo e terzo tipo: le attività che si rinforzano a vicenda sono inimitabili come sistema. (3) \"Con limitato incremento dei costi\": la differenziazione deve rendere più di quanto costa. (4) Niente è permanente: l'unicità va continuamente rinnovata. (5) Influenzare senza possedere: il sistema del valore supera la logica proprietaria."},{"id":"c18","chapter":"I","chapterTitle":"Strategia e vantaggio competitivo","groupCode":"E2.4","groupTitle":"Porter: efficacia operativa, fit, differenziazione","difficulty":"Medium","qnum":"4","question":"Quale delle seguenti affermazioni è falsa? (a) l'ampiezza del divario tra prezzo di vendita e costo di produzione aumenta il valore generato, se tale valore è superiore a quello generato dai concorrenti; (b) la strategia competitiva è il tentativo di differenziarsi attraverso la scelta deliberata di un diverso insieme di attività; (c) I caratteri di unicità e di non facile replicabilità di un prodotto sono condizioni che si possono potenzialmente realizzare in via permanente.","answerLetters":"c","specificNote":"Niente è permanente: l'unicità va continuamente rinnovata.","groupNote":"(1) Efficacia operativa = attività simili, svolte meglio. La (b) descrive il posizionamento strategico — è il distrattore speculare. (2) Fit di secondo e terzo tipo: le attività che si rinforzano a vicenda sono inimitabili come sistema. (3) \"Con limitato incremento dei costi\": la differenziazione deve rendere più di quanto costa. (4) Niente è permanente: l'unicità va continuamente rinnovata. (5) Influenzare senza possedere: il sistema del valore supera la logica proprietaria."},{"id":"c19","chapter":"I","chapterTitle":"Strategia e vantaggio competitivo","groupCode":"E2.4","groupTitle":"Porter: efficacia operativa, fit, differenziazione","difficulty":"Medium","qnum":"5","question":"Il sistema del valore: (a) prospetta la possibilità di controllare altre catene del valore attraverso l'acquisto o la fusione; (b) prospetta di riunire la molteplicità delle catene del valore del settore sotto un'unica grande impresa; (c) prospetta la possibilità di influenzare altre catene del valore senza la condizione di proprietà dei mezzi di produzione sottostanti.","answerLetters":"c","specificNote":"Influenzare senza possedere: il sistema del valore supera la logica proprietaria.","groupNote":"(1) Efficacia operativa = attività simili, svolte meglio. La (b) descrive il posizionamento strategico — è il distrattore speculare. (2) Fit di secondo e terzo tipo: le attività che si rinforzano a vicenda sono inimitabili come sistema. (3) \"Con limitato incremento dei costi\": la differenziazione deve rendere più di quanto costa. (4) Niente è permanente: l'unicità va continuamente rinnovata. (5) Influenzare senza possedere: il sistema del valore supera la logica proprietaria."},{"id":"c20","chapter":"I","chapterTitle":"Strategia e vantaggio competitivo","groupCode":"E2.5","groupTitle":"Processi, tecnologie informatiche, competenze innovative","difficulty":"Medium","qnum":"1","question":"La catena del valore è il risultato di due processi distinti: (a) 1. la selezione fra le varie alternative di investimento; 2. l'implementazione delle decisioni di investimento; (b) 1. l'appropriazione delle risorse scarse; 2. l'implementazione delle decisioni di investimento; (c) 1. la selezione fra le varie alternative di investimento; 2. il controllo dei costi.","answerLetters":"a","specificNote":"Selezione degli investimenti + loro implementazione: prima decidi dove investire, poi esegui.","groupNote":"(1) Selezione degli investimenti + loro implementazione: prima decidi dove investire, poi esegui. (2) L'informatica è entrata in azienda automatizzando le transazioni elementari (fatture, ordini); l'integrazione tra attività è lo stadio successivo. (3) Le competenze sono risorse: è il lessico della Resource Based View."},{"id":"c21","chapter":"I","chapterTitle":"Strategia e vantaggio competitivo","groupCode":"E2.5","groupTitle":"Processi, tecnologie informatiche, competenze innovative","difficulty":"Medium","qnum":"2","question":"Qual è il primo stadio che ha interessato l'implementazione delle tecnologie informatiche nella catena del valore? (a) l'automazione e il miglioramento funzionale delle singole attività; (b) l'integrazione tra le diverse attività della catena del valore; (c) L'automazione delle singole transazioni.","answerLetters":"c","specificNote":"L'informatica è entrata in azienda automatizzando le transazioni elementari (fatture, ordini); l'integrazione tra attività è lo stadio successivo.","groupNote":"(1) Selezione degli investimenti + loro implementazione: prima decidi dove investire, poi esegui. (2) L'informatica è entrata in azienda automatizzando le transazioni elementari (fatture, ordini); l'integrazione tra attività è lo stadio successivo. (3) Le competenze sono risorse: è il lessico della Resource Based View."},{"id":"c22","chapter":"I","chapterTitle":"Strategia e vantaggio competitivo","groupCode":"E2.5","groupTitle":"Processi, tecnologie informatiche, competenze innovative","difficulty":"Medium","qnum":"3","question":"Quale di queste correnti di studio pone enfasi sulle \"competenze innovative\" dell'impresa? (a) l'Industrial Organization (I.O.); (b) La resource-based view of the firm; (c) la scuola di Harvard.","answerLetters":"b","specificNote":"Le competenze sono risorse: è il lessico della Resource Based View.","groupNote":"(1) Selezione degli investimenti + loro implementazione: prima decidi dove investire, poi esegui. (2) L'informatica è entrata in azienda automatizzando le transazioni elementari (fatture, ordini); l'integrazione tra attività è lo stadio successivo. (3) Le competenze sono risorse: è il lessico della Resource Based View."}]},{"roman":"II","title":"Valore economico e mercati finanziari","sectionHeading":"3.4 Esercizi (Capitolo II)","groups":[{"code":"E3.1","title":"Obiettivi e valore economico","difficulty":"Easy","declaredCount":"3","actualCount":3},{"code":"E3.2","title":"Mercati e nozioni di base","difficulty":"Easy","declaredCount":"4","actualCount":4},{"code":"E3.3","title":"Indici, crescita dei dividendi, Modigliani-Miller","difficulty":"Medium","declaredCount":"5","actualCount":5}],"cards":[{"id":"c23","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.1","groupTitle":"Obiettivi e valore economico","difficulty":"Easy","qnum":"1","question":"L'obiettivo della massimizzazione del profitto: (a) può essere perseguito a seconda del contesto in cui opera l'impresa; (b) dev'essere sempre perseguito; (c) nessuna delle risposte precedenti.","answerLetters":"a","specificNote":"Il contesto conta: non tutte le imprese massimizzano il profitto sempre.","groupNote":"(1) Il contesto conta: non tutte le imprese massimizzano il profitto sempre. (2) Senso economico = orientato ai flussi futuri. (3) Il valore economico guarda ai benefici estraibili, non al denaro investito in passato — quello è il costo storico/contabile."},{"id":"c24","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.1","groupTitle":"Obiettivi e valore economico","difficulty":"Easy","qnum":"2","question":"L'affermazione \"creare valore\" dev'essere interpretata in senso: (a) contabile; (b) economico; (c) nessuna delle risposte precedenti.","answerLetters":"b","specificNote":"Senso economico = orientato ai flussi futuri.","groupNote":"(1) Il contesto conta: non tutte le imprese massimizzano il profitto sempre. (2) Senso economico = orientato ai flussi futuri. (3) Il valore economico guarda ai benefici estraibili, non al denaro investito in passato — quello è il costo storico/contabile."},{"id":"c25","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.1","groupTitle":"Obiettivi e valore economico","difficulty":"Easy","qnum":"3","question":"Il valore economico di un'attività: (a) nessuna delle risposte precedenti; (b) indica quanto denaro è stato investito; (c) esprime l'ammontare dei benefici che da questa possono essere tratti.","answerLetters":"c","specificNote":"Il valore economico guarda ai benefici estraibili, non al denaro investito in passato — quello è il costo storico/contabile.","groupNote":"(1) Il contesto conta: non tutte le imprese massimizzano il profitto sempre. (2) Senso economico = orientato ai flussi futuri. (3) Il valore economico guarda ai benefici estraibili, non al denaro investito in passato — quello è il costo storico/contabile."},{"id":"c26","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.2","groupTitle":"Mercati e nozioni di base","difficulty":"Easy","qnum":"1","question":"Un mercato è liquido quando: (a) nessuna delle risposte precedenti; (b) le transazioni sono molto numerose; (c) non esistono asimmetrie informative.","answerLetters":"b","specificNote":"Liquidità = numerosità degli scambi.","groupNote":"(1) Liquidità = numerosità degli scambi. (2) Efficienza = informazione incorporata nei prezzi; costi di transazione e imposte appartengono alle ipotesi di Modigliani-Miller, non alla definizione di efficienza. (3) Liquidare = vendere i pezzi. (4) Capital gain = prezzo di vendita meno prezzo di acquisto."},{"id":"c27","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.2","groupTitle":"Mercati e nozioni di base","difficulty":"Easy","qnum":"2","question":"Un mercato è efficiente: (a) se i prezzi delle azioni riflettono tutte le informazioni rilevanti disponibili; (b) se non è previsto il pagamento di imposte; (c) se non esistono costi di transazione.","answerLetters":"a","specificNote":"Efficienza = informazione incorporata nei prezzi; costi di transazione e imposte appartengono alle ipotesi di Modigliani-Miller, non alla definizione di efficienza.","groupNote":"(1) Liquidità = numerosità degli scambi. (2) Efficienza = informazione incorporata nei prezzi; costi di transazione e imposte appartengono alle ipotesi di Modigliani-Miller, non alla definizione di efficienza. (3) Liquidare = vendere i pezzi. (4) Capital gain = prezzo di vendita meno prezzo di acquisto."},{"id":"c28","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.2","groupTitle":"Mercati e nozioni di base","difficulty":"Easy","qnum":"3","question":"Il valore di liquidazione di un'attività: (a) coincide con il valore che si ottiene vendendo gli asset che la compongono; (b) entrambe le risposte precedenti; (c) coincide con il valore del funzionamento.","answerLetters":"a","specificNote":"Liquidare = vendere i pezzi.","groupNote":"(1) Liquidità = numerosità degli scambi. (2) Efficienza = informazione incorporata nei prezzi; costi di transazione e imposte appartengono alle ipotesi di Modigliani-Miller, non alla definizione di efficienza. (3) Liquidare = vendere i pezzi. (4) Capital gain = prezzo di vendita meno prezzo di acquisto."},{"id":"c29","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.2","groupTitle":"Mercati e nozioni di base","difficulty":"Easy","qnum":"4","question":"In relazione al possesso di un'azione, il capital gain è: (a) la differenza tra il dividendo atteso e il dividendo corrente; (b) la differenza tra il valore contabile e quello di mercato; (c) la differenza tra il prezzo di vendita e quello di acquisto.","answerLetters":"c","specificNote":"Capital gain = prezzo di vendita meno prezzo di acquisto.","groupNote":"(1) Liquidità = numerosità degli scambi. (2) Efficienza = informazione incorporata nei prezzi; costi di transazione e imposte appartengono alle ipotesi di Modigliani-Miller, non alla definizione di efficienza. (3) Liquidare = vendere i pezzi. (4) Capital gain = prezzo di vendita meno prezzo di acquisto."},{"id":"c30","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.3","groupTitle":"Indici, crescita dei dividendi, Modigliani-Miller","difficulty":"Medium","qnum":"1","question":"Il corretto ROE è un indice di redditività: (a) delle attività; (b) del capitale netto; (c) del capitale circolante netto.","answerLetters":"b","specificNote":"","groupNote":"(3) Calcolo: g = ROE × tasso di ritenzione = 10% × (100% − 40%) = 10% × 60% = 6% = 0,06. L'errore da 0,04 è moltiplicare per il payout invece che per la ritenzione. (4) La leva cambia rischio/rendimento delle azioni , mai delle attività: l'attivo non sa come è finanziato."},{"id":"c31","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.3","groupTitle":"Indici, crescita dei dividendi, Modigliani-Miller","difficulty":"Medium","qnum":"2","question":"Il cosiddetto ROS è un indice di redditività: (a) dell'investimento; (b) delle attività; (c) delle vendite.","answerLetters":"c","specificNote":"","groupNote":"(3) Calcolo: g = ROE × tasso di ritenzione = 10% × (100% − 40%) = 10% × 60% = 6% = 0,06. L'errore da 0,04 è moltiplicare per il payout invece che per la ritenzione. (4) La leva cambia rischio/rendimento delle azioni , mai delle attività: l'attivo non sa come è finanziato."},{"id":"c32","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.3","groupTitle":"Indici, crescita dei dividendi, Modigliani-Miller","difficulty":"Medium","qnum":"3","question":"Nel caso in cui il ROE di un'azienda sia pari al 10% e il tasso di distribuzione degli utili sia pari al 40%, il tasso di crescita dei dividendi è pari a: (a) 0.06; (b) 0.04; (c) i dati a disposizione non sono sufficienti.","answerLetters":"a","specificNote":"Calcolo: g = ROE × tasso di ritenzione = 10% × (100% − 40%) = 10% × 60% = 6% = 0,06. L'errore da 0,04 è moltiplicare per il payout invece che per la ritenzione.","groupNote":"(3) Calcolo: g = ROE × tasso di ritenzione = 10% × (100% − 40%) = 10% × 60% = 6% = 0,06. L'errore da 0,04 è moltiplicare per il payout invece che per la ritenzione. (4) La leva cambia rischio/rendimento delle azioni , mai delle attività: l'attivo non sa come è finanziato."},{"id":"c33","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.3","groupTitle":"Indici, crescita dei dividendi, Modigliani-Miller","difficulty":"Medium","qnum":"4","question":"In mercati perfetti (Modigliani e Miller), la leva finanziaria non influenza: (a) il rischio e il rendimento delle attività dell'impresa; (b) il rischio e il rendimento delle azioni; (c) entrambe le risposte precedenti.","answerLetters":"a","specificNote":"La leva cambia rischio/rendimento delle azioni , mai delle attività: l'attivo non sa come è finanziato.","groupNote":"(3) Calcolo: g = ROE × tasso di ritenzione = 10% × (100% − 40%) = 10% × 60% = 6% = 0,06. L'errore da 0,04 è moltiplicare per il payout invece che per la ritenzione. (4) La leva cambia rischio/rendimento delle azioni , mai delle attività: l'attivo non sa come è finanziato."},{"id":"c34","chapter":"II","chapterTitle":"Valore economico e mercati finanziari","groupCode":"E3.3","groupTitle":"Indici, crescita dei dividendi, Modigliani-Miller","difficulty":"Medium","qnum":"5","question":"Il termine shareholder indica: (a) gli azionisti; (b) i manager; (c) i creditori.","answerLetters":"a","specificNote":"","groupNote":"(3) Calcolo: g = ROE × tasso di ritenzione = 10% × (100% − 40%) = 10% × 60% = 6% = 0,06. L'errore da 0,04 è moltiplicare per il payout invece che per la ritenzione. (4) La leva cambia rischio/rendimento delle azioni , mai delle attività: l'attivo non sa come è finanziato."}]},{"roman":"III","title":"Risorse e competenze","sectionHeading":"4.4 Esercizi (Capitolo III)","groups":[{"code":"E4.1","title":"RBV, rendite, indicatori","difficulty":"Easy","declaredCount":"4","actualCount":4},{"code":"E4.2","title":"Ghemawat, capacità dinamiche, stretch","difficulty":"Medium","declaredCount":"4","actualCount":4},{"code":"E4.3","title":"La leva sulle risorse","difficulty":"Medium","declaredCount":"3","actualCount":3},{"code":"E4.4","title":"Competenze: Hamel-Prahalad, Lipparini-Grant, costi di transazione","difficulty":"Hard","declaredCount":"5","actualCount":5},{"code":"E4.5","title":"Valutazione delle risorse e gap analysis","difficulty":"Easy","declaredCount":"4","actualCount":4}],"cards":[{"id":"c35","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.1","groupTitle":"RBV, rendite, indicatori","difficulty":"Easy","qnum":"1","question":"Secondo la Resource Based View, il vantaggio competitivo è ricondotto a rendite che affluiscono all'impresa: (a) da una maggiore efficienza e dal possesso di risorse scarse; (b) da nessuna delle altre opzioni citate; (c) in seguito a investimenti volti a scoraggiare l'entrata dei concorrenti.","answerLetters":"a","specificNote":"","groupNote":"(2) Attento: il sorgente marca \"ricardiane\" anche se la teoria da manuale legherebbe la mancata competizione alle rendite monopolistiche — vedi la TRAPPOLA in §4.1. Rispondi come il sorgente. (3) Il rapporto tra i due valori misura quanto capitale \"invisibile\" (competenze, marchi) il bilancio non registra. (4) Competenze riconfigurabili = adattamento: RBV."},{"id":"c36","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.1","groupTitle":"RBV, rendite, indicatori","difficulty":"Easy","qnum":"2","question":"Nel caso di profitti scaturenti da una mancata competizione si parla di: (a) rendite ricardiane; (b) rendite oligopolistiche; (c) rendite monopolistiche.","answerLetters":"a","specificNote":"Attento: il sorgente marca \"ricardiane\" anche se la teoria da manuale legherebbe la mancata competizione alle rendite monopolistiche — vedi la TRAPPOLA in §4.1. Rispondi come il sorgente.","groupNote":"(2) Attento: il sorgente marca \"ricardiane\" anche se la teoria da manuale legherebbe la mancata competizione alle rendite monopolistiche — vedi la TRAPPOLA in §4.1. Rispondi come il sorgente. (3) Il rapporto tra i due valori misura quanto capitale \"invisibile\" (competenze, marchi) il bilancio non registra. (4) Competenze riconfigurabili = adattamento: RBV."},{"id":"c37","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.1","groupTitle":"RBV, rendite, indicatori","difficulty":"Easy","qnum":"3","question":"Il Market-to-Book Ratio è costituito da: (a) il rapporto tra il valore contabile e il valore di mercato; (b) il valore contabile; (c) il valore di mercato.","answerLetters":"a","specificNote":"Il rapporto tra i due valori misura quanto capitale \"invisibile\" (competenze, marchi) il bilancio non registra.","groupNote":"(2) Attento: il sorgente marca \"ricardiane\" anche se la teoria da manuale legherebbe la mancata competizione alle rendite monopolistiche — vedi la TRAPPOLA in §4.1. Rispondi come il sorgente. (3) Il rapporto tra i due valori misura quanto capitale \"invisibile\" (competenze, marchi) il bilancio non registra. (4) Competenze riconfigurabili = adattamento: RBV."},{"id":"c38","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.1","groupTitle":"RBV, rendite, indicatori","difficulty":"Easy","qnum":"4","question":"Quale delle seguenti correnti di studio presenta un vantaggio competitivo nell'adattamento ai cambiamenti esterni? (a) La Resource Based View; (b) il Taylorismo; (c) l'Industrial Organization.","answerLetters":"a","specificNote":"Competenze riconfigurabili = adattamento: RBV.","groupNote":"(2) Attento: il sorgente marca \"ricardiane\" anche se la teoria da manuale legherebbe la mancata competizione alle rendite monopolistiche — vedi la TRAPPOLA in §4.1. Rispondi come il sorgente. (3) Il rapporto tra i due valori misura quanto capitale \"invisibile\" (competenze, marchi) il bilancio non registra. (4) Competenze riconfigurabili = adattamento: RBV."},{"id":"c39","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.2","groupTitle":"Ghemawat, capacità dinamiche, stretch","difficulty":"Medium","qnum":"1","question":"Quali sono, secondo Pankaj Ghemawat, i due modi per costruire una posizione di vantaggio competitivo sostenibile? (a) 1. Creare commitment sulle risorse; 2. sviluppare competenze nell'orchestrare le attività dell'impresa; (b) 1. sviluppare risorse competitive; 2. esternalizzare le competenze non necessarie; (c) 1. ridurre i costi; 2. aumentare i profitti.","answerLetters":"a","specificNote":"","groupNote":"(2) Il commitment: poche decisioni grandi e vincolanti. (3) Le aziende dinamiche comprano velocità, non risparmio. (4) Stretch = lo scollamento ambizioni/risorse; la risposta gemella è \"stretch and leverage\": ambizione tesa + leva sulle risorse esistenti."},{"id":"c40","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.2","groupTitle":"Ghemawat, capacità dinamiche, stretch","difficulty":"Medium","qnum":"2","question":"Che cosa viene definito come \"un insieme ridotto di decisioni che determinano cambiamenti significativi nella dotazione delle risorse\"? (a) Il commitment; (b) l'asset; (c) il turnaround.","answerLetters":"a","specificNote":"Il commitment: poche decisioni grandi e vincolanti.","groupNote":"(2) Il commitment: poche decisioni grandi e vincolanti. (3) Le aziende dinamiche comprano velocità, non risparmio. (4) Stretch = lo scollamento ambizioni/risorse; la risposta gemella è \"stretch and leverage\": ambizione tesa + leva sulle risorse esistenti."},{"id":"c41","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.2","groupTitle":"Ghemawat, capacità dinamiche, stretch","difficulty":"Medium","qnum":"3","question":"Secondo il paradigma delle capacità dinamiche, quale di queste caratteristiche non è propria delle aziende dinamiche? (a) la rapidità di manovra strategica; (b) i ridotti time-to-market; (c) Il contenimento dei costi.","answerLetters":"c","specificNote":"Le aziende dinamiche comprano velocità, non risparmio.","groupNote":"(2) Il commitment: poche decisioni grandi e vincolanti. (3) Le aziende dinamiche comprano velocità, non risparmio. (4) Stretch = lo scollamento ambizioni/risorse; la risposta gemella è \"stretch and leverage\": ambizione tesa + leva sulle risorse esistenti."},{"id":"c42","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.2","groupTitle":"Ghemawat, capacità dinamiche, stretch","difficulty":"Medium","qnum":"4","question":"Una strategia che fa emergere uno scollamento tra le risorse attuali e le ambizioni di sviluppo è definita: (a) strategia come leverage; (b) strategia come slack; (c) strategia come stretch. — E la focalizzazione sulle risorse interne e le competenze chiave verrà perseguita dalle aziende con un approccio: (a) stretch and slack; (b) stretch and leverage; (c) stretch.","answerLetters":"c / b","specificNote":"Stretch = lo scollamento ambizioni/risorse; la risposta gemella è \"stretch and leverage\": ambizione tesa + leva sulle risorse esistenti.","groupNote":"(2) Il commitment: poche decisioni grandi e vincolanti. (3) Le aziende dinamiche comprano velocità, non risparmio. (4) Stretch = lo scollamento ambizioni/risorse; la risposta gemella è \"stretch and leverage\": ambizione tesa + leva sulle risorse esistenti."},{"id":"c43","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.3","groupTitle":"La leva sulle risorse","difficulty":"Medium","qnum":"1","question":"Quale delle seguenti coppie di modalità non fa parte della leva sulle risorse? (a) concentrating and complementing; (b) Developing and marketing; (c) conserving e accumulating.","answerLetters":"b","specificNote":"","groupNote":"Le cinque modalità autentiche: concentrating, accumulating, complementing, conserving, recovering (§4.2). \"Developing and marketing\" non esiste nella lista. Il licensing = accedere a risorse altrui = accumulating. Pay-back più corto = recovering. E recuperare efficienza significa trovare modi meno avidi di risorse, non amputarle."},{"id":"c44","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.3","groupTitle":"La leva sulle risorse","difficulty":"Medium","qnum":"2","question":"Di quale modo di far leva sulle risorse fa parte la possibilità di accedere a risorse esterne attraverso licensing? (a) complementing; (b) Accumulating; (c) recovering.","answerLetters":"b","specificNote":"","groupNote":"Le cinque modalità autentiche: concentrating, accumulating, complementing, conserving, recovering (§4.2). \"Developing and marketing\" non esiste nella lista. Il licensing = accedere a risorse altrui = accumulating. Pay-back più corto = recovering. E recuperare efficienza significa trovare modi meno avidi di risorse, non amputarle."},{"id":"c45","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.3","groupTitle":"La leva sulle risorse","difficulty":"Medium","qnum":"3","question":"All'interno della strategia che fa leva sulle risorse, la riduzione del tempo di pay-back è parte della modalità: (a) di recupero; (b) di concentrazione; (c) di complementarietà. — E i recuperi di efficienza, basati sulla leva delle risorse, fanno riferimento: (a) alla capacità gestionale del top management; (b) al taglio delle risorse stesse; (c) alla continua ricerca di nuovi modi a minore intensità di risorse.","answerLetters":"a / c","specificNote":"","groupNote":"Le cinque modalità autentiche: concentrating, accumulating, complementing, conserving, recovering (§4.2). \"Developing and marketing\" non esiste nella lista. Il licensing = accedere a risorse altrui = accumulating. Pay-back più corto = recovering. E recuperare efficienza significa trovare modi meno avidi di risorse, non amputarle."},{"id":"c46","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.4","groupTitle":"Competenze: Hamel-Prahalad, Lipparini-Grant, costi di transazione","difficulty":"Hard","qnum":"1","question":"La competenza centrale, secondo Hamel e Prahalad, deve: (a) consentire l'entrata in un ampio numero di nuovi mercati; (b) diminuire i costi di produzione; (c) ridurre il time-to-market.","answerLetters":"a","specificNote":"","groupNote":"La mappa di Lipparini e Grant si naviga con due assi (valore per il cliente, specificità per l'impresa): alto+alto = needed-to-win, da sviluppare dentro; le combinazioni miste = needed-to-play, da comprare sul mercato; alta specificità + basso valore = alleanze. L'internalizzazione \"per controllare meglio\" è il cuore della teoria dei costi di transazione: organizzare dentro ciò che il mercato governerebbe male."},{"id":"c47","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.4","groupTitle":"Competenze: Hamel-Prahalad, Lipparini-Grant, costi di transazione","difficulty":"Hard","qnum":"2","question":"Secondo l'architettura delle competenze organizzative di Lipparini e Grant, le competenze needed-to-play devono avere: (a) alto valore e bassa unicità oppure basso valore e alta unicità; (b) esclusivamente alta unicità e basso valore; (c) nessuna delle altre risposte precedenti.","answerLetters":"a","specificNote":"","groupNote":"La mappa di Lipparini e Grant si naviga con due assi (valore per il cliente, specificità per l'impresa): alto+alto = needed-to-win, da sviluppare dentro; le combinazioni miste = needed-to-play, da comprare sul mercato; alta specificità + basso valore = alleanze. L'internalizzazione \"per controllare meglio\" è il cuore della teoria dei costi di transazione: organizzare dentro ciò che il mercato governerebbe male."},{"id":"c48","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.4","groupTitle":"Competenze: Hamel-Prahalad, Lipparini-Grant, costi di transazione","difficulty":"Hard","qnum":"3","question":"Secondo Lipparini e Grant, lo sviluppo di alleanze è idoneo per: (a) competenze ad alto valore per il cliente e alta firm specificity; (b) basse competenze e firm specificity e alto valore per il cliente; (c) competenze ad alta firm specificity e basso valore per il cliente.","answerLetters":"c","specificNote":"","groupNote":"La mappa di Lipparini e Grant si naviga con due assi (valore per il cliente, specificità per l'impresa): alto+alto = needed-to-win, da sviluppare dentro; le combinazioni miste = needed-to-play, da comprare sul mercato; alta specificità + basso valore = alleanze. L'internalizzazione \"per controllare meglio\" è il cuore della teoria dei costi di transazione: organizzare dentro ciò che il mercato governerebbe male."},{"id":"c49","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.4","groupTitle":"Competenze: Hamel-Prahalad, Lipparini-Grant, costi di transazione","difficulty":"Hard","qnum":"4","question":"Secondo Lipparini e Grant, il ricorso al mercato è idoneo alle competenze: (a) needed-to-lose; (b) needed-to-play; (c) needed-to-win.","answerLetters":"b","specificNote":"","groupNote":"La mappa di Lipparini e Grant si naviga con due assi (valore per il cliente, specificità per l'impresa): alto+alto = needed-to-win, da sviluppare dentro; le combinazioni miste = needed-to-play, da comprare sul mercato; alta specificità + basso valore = alleanze. L'internalizzazione \"per controllare meglio\" è il cuore della teoria dei costi di transazione: organizzare dentro ciò che il mercato governerebbe male."},{"id":"c50","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.4","groupTitle":"Competenze: Hamel-Prahalad, Lipparini-Grant, costi di transazione","difficulty":"Hard","qnum":"5","question":"Quale delle seguenti teorie ritiene appropriata l'internalizzazione delle competenze, nel momento in cui questa permette un controllo efficace sulla performance degli addetti e lo sviluppo corretto ed efficiente delle loro capacità? (a) la teoria della Resource Based View; (b) la teoria del capitale umano; (c) La teoria dei costi di transazione.","answerLetters":"c","specificNote":"","groupNote":"La mappa di Lipparini e Grant si naviga con due assi (valore per il cliente, specificità per l'impresa): alto+alto = needed-to-win, da sviluppare dentro; le combinazioni miste = needed-to-play, da comprare sul mercato; alta specificità + basso valore = alleanze. L'internalizzazione \"per controllare meglio\" è il cuore della teoria dei costi di transazione: organizzare dentro ciò che il mercato governerebbe male."},{"id":"c51","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.5","groupTitle":"Valutazione delle risorse e gap analysis","difficulty":"Easy","qnum":"1","question":"La lista delle risorse e competenze chiave dovrebbe essere fatta: (a) dal lato della domanda e dell'offerta; (b) nessuna delle altre risposte precedenti; (c) dal lato dei competitor e dei fornitori.","answerLetters":"a","specificNote":"","groupNote":"(3) Qui la banca domande marca \"posizione desiderata\". Il quiz a risposta multipla (domanda 34) marca però \"benchmark di mercato\" per la stessa domanda: contraddizione interna del sorgente, segnalata in §4.3. Tieni a mente entrambe le versioni e, se possibile, la formulazione esatta delle opzioni che ti compaiono davanti."},{"id":"c52","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.5","groupTitle":"Valutazione delle risorse e gap analysis","difficulty":"Easy","qnum":"2","question":"Le risorse e le competenze non vengono valutate per quale dei seguenti fattori? (a) forza relativa; (b) Incidenza sui costi; (c) importanza.","answerLetters":"b","specificNote":"","groupNote":"(3) Qui la banca domande marca \"posizione desiderata\". Il quiz a risposta multipla (domanda 34) marca però \"benchmark di mercato\" per la stessa domanda: contraddizione interna del sorgente, segnalata in §4.3. Tieni a mente entrambe le versioni e, se possibile, la formulazione esatta delle opzioni che ti compaiono davanti."},{"id":"c53","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.5","groupTitle":"Valutazione delle risorse e gap analysis","difficulty":"Easy","qnum":"3","question":"La gap analysis individua il divario dell'impresa attuale con: (a) il benchmark di mercato; (b) la posizione desiderata; (c) il competitor medio del mercato.","answerLetters":"b","specificNote":"Qui la banca domande marca \"posizione desiderata\". Il quiz a risposta multipla (domanda 34) marca però \"benchmark di mercato\" per la stessa domanda: contraddizione interna del sorgente, segnalata in §4.3. Tieni a mente entrambe le versioni e, se possibile, la formulazione esatta delle opzioni che ti compaiono davanti.","groupNote":"(3) Qui la banca domande marca \"posizione desiderata\". Il quiz a risposta multipla (domanda 34) marca però \"benchmark di mercato\" per la stessa domanda: contraddizione interna del sorgente, segnalata in §4.3. Tieni a mente entrambe le versioni e, se possibile, la formulazione esatta delle opzioni che ti compaiono davanti."},{"id":"c54","chapter":"III","chapterTitle":"Risorse e competenze","groupCode":"E4.5","groupTitle":"Valutazione delle risorse e gap analysis","difficulty":"Easy","qnum":"4","question":"I competency modeling confrontano: (a) i processi aziendali con quelli dei benchmark; (b) ogni singolo dipendente con le skills, le attitudini e i valori dei top performer; (c) il tasso di innovazione interno con quello dei principali competitor.","answerLetters":"b","specificNote":"","groupNote":"(3) Qui la banca domande marca \"posizione desiderata\". Il quiz a risposta multipla (domanda 34) marca però \"benchmark di mercato\" per la stessa domanda: contraddizione interna del sorgente, segnalata in §4.3. Tieni a mente entrambe le versioni e, se possibile, la formulazione esatta delle opzioni che ti compaiono davanti."}]},{"roman":"IV","title":"Analisi competitiva e definizione del business","sectionHeading":"5.6 Esercizi (Capitolo IV)","groups":[{"code":"E5.1","title":"Strategia e strategic thinking","difficulty":"Easy","declaredCount":"5","actualCount":5},{"code":"E5.2","title":"Definizione del business e segmentazione","difficulty":"Medium","declaredCount":"6","actualCount":6},{"code":"E5.3","title":"Cinque forze e barriere","difficulty":"Medium","declaredCount":"5","actualCount":5},{"code":"E5.4","title":"Vantaggio competitivo e valore","difficulty":"Medium","declaredCount":"6","actualCount":6},{"code":"E5.5","title":"SWOT, fattori critici, ambiente","difficulty":"Easy","declaredCount":"6","actualCount":6}],"cards":[{"id":"c55","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.1","groupTitle":"Strategia e strategic thinking","difficulty":"Easy","qnum":"1","question":"Quale delle seguenti affermazioni riguardanti il concetto di strategia non è corretta? (a) la strategia è un insieme integrato di decisioni volte a costruire un vantaggio competitivo; (b) La strategia mira a sviluppare un vantaggio competitivo nel breve o medio periodo; (c) la strategia di un'impresa è il risultato di un insieme di decisioni che devono essere tra loro coerenti, ma che spesso possono presentarsi in contrasto.","answerLetters":"b","specificNote":"Il vantaggio strategico è di lungo periodo: \"breve o medio\" è l'errore.","groupNote":"(1) Il vantaggio strategico è di lungo periodo: \"breve o medio\" è l'errore. (3) Il binomio mercato/risorse è il doppio sguardo fuori-dentro che attraversa tutto il corso. (4) Le economie di scala sono una strada possibile, non un tratto universale. (5) La strategia abbraccia anche l'esecuzione."},{"id":"c56","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.1","groupTitle":"Strategia e strategic thinking","difficulty":"Easy","qnum":"2","question":"La creatività imprenditoriale basata su idee innovative, che poi si concretizzano in attività di impresa, è definita: (a) strategic thinking; (b) strategic planning; (c) opportunistic decision making.","answerLetters":"a","specificNote":"","groupNote":"(1) Il vantaggio strategico è di lungo periodo: \"breve o medio\" è l'errore. (3) Il binomio mercato/risorse è il doppio sguardo fuori-dentro che attraversa tutto il corso. (4) Le economie di scala sono una strada possibile, non un tratto universale. (5) La strategia abbraccia anche l'esecuzione."},{"id":"c57","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.1","groupTitle":"Strategia e strategic thinking","difficulty":"Easy","qnum":"3","question":"Quali sono i due sistemi di variabili sui quali si devono basare decision thinking, decision making e opportunistic strategic planning? (a) 1. mercato; 2. competitor; (b) 1. Mercato; 2. risorse e competenze acquisite; (c) 1. fornitori; 2. clienti.","answerLetters":"b","specificNote":"Il binomio mercato/risorse è il doppio sguardo fuori-dentro che attraversa tutto il corso.","groupNote":"(1) Il vantaggio strategico è di lungo periodo: \"breve o medio\" è l'errore. (3) Il binomio mercato/risorse è il doppio sguardo fuori-dentro che attraversa tutto il corso. (4) Le economie di scala sono una strada possibile, non un tratto universale. (5) La strategia abbraccia anche l'esecuzione."},{"id":"c58","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.1","groupTitle":"Strategia e strategic thinking","difficulty":"Easy","qnum":"4","question":"Quale dei seguenti punti non accomuna necessariamente le strategie di successo? (a) obiettivi semplici, coerenti tra loro e pensati nel lungo termine; (b) Decisione rilevante della struttura aziendale, volta a perseguire economie di scala; (c) comprensione approfondita dell'ambiente competitivo.","answerLetters":"b","specificNote":"Le economie di scala sono una strada possibile, non un tratto universale.","groupNote":"(1) Il vantaggio strategico è di lungo periodo: \"breve o medio\" è l'errore. (3) Il binomio mercato/risorse è il doppio sguardo fuori-dentro che attraversa tutto il corso. (4) Le economie di scala sono una strada possibile, non un tratto universale. (5) La strategia abbraccia anche l'esecuzione."},{"id":"c59","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.1","groupTitle":"Strategia e strategic thinking","difficulty":"Easy","qnum":"5","question":"La strategia di un'impresa: (a) è un processo razionale che scaturisce in modo automatico, se si comprendono bene tutte le variabili ambientali; (b) riguarda tutte le funzioni dell'impresa; (c) non si deve occupare della parte di realizzazione, che compete ai livelli inferiori.","answerLetters":"b","specificNote":"La strategia abbraccia anche l'esecuzione.","groupNote":"(1) Il vantaggio strategico è di lungo periodo: \"breve o medio\" è l'errore. (3) Il binomio mercato/risorse è il doppio sguardo fuori-dentro che attraversa tutto il corso. (4) Le economie di scala sono una strada possibile, non un tratto universale. (5) La strategia abbraccia anche l'esecuzione."},{"id":"c60","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.2","groupTitle":"Definizione del business e segmentazione","difficulty":"Medium","qnum":"1","question":"Quale delle seguenti dimensioni non serve nel modello di definizione del business? (a) Budget; (b) modalità; (c) funzionalità.","answerLetters":"a","specificNote":"","groupNote":"Le tre dimensioni di Abell sono funzioni, clienti, modalità: il budget non c'entra. Le modalità sono dinamiche perché le tecnologie evolvono. La concorrenza si definisce su funzioni+clienti, ignorando le modalità — il treno compete con l'aereo. La segmentazione è analisi pianificata, non gestione degli imprevisti."},{"id":"c61","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.2","groupTitle":"Definizione del business e segmentazione","difficulty":"Medium","qnum":"2","question":"Le \"modalità\" sono caratteristiche: (a) nessuna delle altre risposte precedenti; (b) statiche; (c) dinamiche.","answerLetters":"c","specificNote":"","groupNote":"Le tre dimensioni di Abell sono funzioni, clienti, modalità: il budget non c'entra. Le modalità sono dinamiche perché le tecnologie evolvono. La concorrenza si definisce su funzioni+clienti, ignorando le modalità — il treno compete con l'aereo. La segmentazione è analisi pianificata, non gestione degli imprevisti."},{"id":"c62","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.2","groupTitle":"Definizione del business e segmentazione","difficulty":"Medium","qnum":"3","question":"Il concetto di funzione indica: (a) come l'impresa soddisfa determinati bisogni a determinati gruppi di clienti; (b) quali bisogni l'impresa soddisfa a determinati gruppi di clienti; (c) quali sono i criteri d'acquisto con cui i clienti decidono.","answerLetters":"b","specificNote":"","groupNote":"Le tre dimensioni di Abell sono funzioni, clienti, modalità: il budget non c'entra. Le modalità sono dinamiche perché le tecnologie evolvono. La concorrenza si definisce su funzioni+clienti, ignorando le modalità — il treno compete con l'aereo. La segmentazione è analisi pianificata, non gestione degli imprevisti."},{"id":"c63","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.2","groupTitle":"Definizione del business e segmentazione","difficulty":"Medium","qnum":"4","question":"L'identificazione di diversi gruppi di clienti e di diverse funzioni, che permette di individuare sottoinsiemi omogenei, è detta: (a) benchmarking; (b) fattore critico di successo; (c) segmentazione strategica.","answerLetters":"c","specificNote":"","groupNote":"Le tre dimensioni di Abell sono funzioni, clienti, modalità: il budget non c'entra. Le modalità sono dinamiche perché le tecnologie evolvono. La concorrenza si definisce su funzioni+clienti, ignorando le modalità — il treno compete con l'aereo. La segmentazione è analisi pianificata, non gestione degli imprevisti."},{"id":"c64","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.2","groupTitle":"Definizione del business e segmentazione","difficulty":"Medium","qnum":"5","question":"Per osservare chi compete nel mercato in cui opera, l'impresa A deve analizzare: (a) chi soddisfa le stesse funzioni agli stessi gruppi di clienti con le sue stesse modalità; (b) tutti i gruppi di clienti e tutti i bisogni soddisfabili; (c) chi soddisfa le stesse funzioni agli stessi gruppi di clienti a cui si rivolge l'impresa A, anche con modalità diverse.","answerLetters":"c","specificNote":"","groupNote":"Le tre dimensioni di Abell sono funzioni, clienti, modalità: il budget non c'entra. Le modalità sono dinamiche perché le tecnologie evolvono. La concorrenza si definisce su funzioni+clienti, ignorando le modalità — il treno compete con l'aereo. La segmentazione è analisi pianificata, non gestione degli imprevisti."},{"id":"c65","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.2","groupTitle":"Definizione del business e segmentazione","difficulty":"Medium","qnum":"6","question":"Indica quale delle seguenti affermazioni NON è corretta relativamente al processo di segmentazione: (a) facilita l'identificazione di fattori critici di successo diversi; (b) facilita la capacità di dare risposte efficaci a problemi inattesi; (c) permette di individuare sottoinsiemi omogenei di gruppi di clienti e di funzioni.","answerLetters":"b","specificNote":"","groupNote":"Le tre dimensioni di Abell sono funzioni, clienti, modalità: il budget non c'entra. Le modalità sono dinamiche perché le tecnologie evolvono. La concorrenza si definisce su funzioni+clienti, ignorando le modalità — il treno compete con l'aereo. La segmentazione è analisi pianificata, non gestione degli imprevisti."},{"id":"c66","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.3","groupTitle":"Cinque forze e barriere","difficulty":"Medium","qnum":"1","question":"Il modello di \"concorrenza allargata\" realizzato da Michael Porter nel 1980 parte da una prospettiva di: (a) Resource Based View of the firm; (b) Industrial Organization; (c) network analysis.","answerLetters":"b","specificNote":"","groupNote":"(2) L'incidenza degli acquisti sul fatturato misura il potere dei clienti, non le barriere — e questa domanda compare quattro volte nel sorgente: imparala. (4) Barriere all'uscita ALTE = imprese intrappolate che combattono = rivalità ALTA; quindi \"barriere basse → rivalità maggiore\" è falso. (5) L'analisi del concorrente culmina nella previsione delle sue mosse."},{"id":"c67","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.3","groupTitle":"Cinque forze e barriere","difficulty":"Medium","qnum":"2","question":"Quale dei seguenti fattori non ha impatto sulla creazione di barriere all'entrata di un mercato? (a) Incidenza degli acquisti sul fatturato dei venditori; (b) accesso ai canali distributivi; (c) differenziazione di prodotto.","answerLetters":"a","specificNote":"L'incidenza degli acquisti sul fatturato misura il potere dei clienti, non le barriere — e questa domanda compare quattro volte nel sorgente: imparala.","groupNote":"(2) L'incidenza degli acquisti sul fatturato misura il potere dei clienti, non le barriere — e questa domanda compare quattro volte nel sorgente: imparala. (4) Barriere all'uscita ALTE = imprese intrappolate che combattono = rivalità ALTA; quindi \"barriere basse → rivalità maggiore\" è falso. (5) L'analisi del concorrente culmina nella previsione delle sue mosse."},{"id":"c68","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.3","groupTitle":"Cinque forze e barriere","difficulty":"Medium","qnum":"3","question":"La sensibilità al prezzo degli acquirenti non viene generalmente condizionata dal seguente fattore: (a) situazione finanziaria degli acquirenti; (b) livello di differenziazione del prodotto; (c) costi di conversione.","answerLetters":"c","specificNote":"","groupNote":"(2) L'incidenza degli acquisti sul fatturato misura il potere dei clienti, non le barriere — e questa domanda compare quattro volte nel sorgente: imparala. (4) Barriere all'uscita ALTE = imprese intrappolate che combattono = rivalità ALTA; quindi \"barriere basse → rivalità maggiore\" è falso. (5) L'analisi del concorrente culmina nella previsione delle sue mosse."},{"id":"c69","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.3","groupTitle":"Cinque forze e barriere","difficulty":"Medium","qnum":"4","question":"A parità di altre condizioni, la rivalità tra le imprese consolidate all'interno di un settore è maggiore se le barriere all'uscita sono basse? (a) FALSO; (b) dipende dalla natura delle barriere all'uscita; (c) vero.","answerLetters":"a","specificNote":"Barriere all'uscita ALTE = imprese intrappolate che combattono = rivalità ALTA; quindi \"barriere basse → rivalità maggiore\" è falso.","groupNote":"(2) L'incidenza degli acquisti sul fatturato misura il potere dei clienti, non le barriere — e questa domanda compare quattro volte nel sorgente: imparala. (4) Barriere all'uscita ALTE = imprese intrappolate che combattono = rivalità ALTA; quindi \"barriere basse → rivalità maggiore\" è falso. (5) L'analisi del concorrente culmina nella previsione delle sue mosse."},{"id":"c70","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.3","groupTitle":"Cinque forze e barriere","difficulty":"Medium","qnum":"5","question":"La valutazione del \"profilo di comportamento potenziale\" di ogni singolo concorrente si conclude con l'analisi di: (a) valutazioni e ipotesi guida su di sé e sul mercato; (b) possibili manovre dei concorrenti; (c) strategia attuale.","answerLetters":"b","specificNote":"L'analisi del concorrente culmina nella previsione delle sue mosse.","groupNote":"(2) L'incidenza degli acquisti sul fatturato misura il potere dei clienti, non le barriere — e questa domanda compare quattro volte nel sorgente: imparala. (4) Barriere all'uscita ALTE = imprese intrappolate che combattono = rivalità ALTA; quindi \"barriere basse → rivalità maggiore\" è falso. (5) L'analisi del concorrente culmina nella previsione delle sue mosse."},{"id":"c71","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.4","groupTitle":"Vantaggio competitivo e valore","difficulty":"Medium","qnum":"1","question":"Le due tipologie di vantaggi competitivi sono: (a) 1. vantaggio di costo; 2. vantaggio finanziario; (b) 1. vantaggio di costo; 2. vantaggio di differenziazione; (c) 1. vantaggio di prezzo; 2. vantaggio di tempo.","answerLetters":"b","specificNote":"","groupNote":"(2)(3) Le due strategie aumentano entrambe il margine, ma da lati opposti: il costo lo riduce dal lato dei costi, la differenziazione lo alza dal lato dei ricavi. (4) Una differenza che il cliente non percepisce non sposta la sua disponibilità a pagare. (6) Le economie di scala abbassano il costo MEDIO unitario; i costi totali salgono col volume."},{"id":"c72","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.4","groupTitle":"Vantaggio competitivo e valore","difficulty":"Medium","qnum":"2","question":"La trasformazione della catena del valore, a seguito di una strategia di leadership di costo, dovrebbe comportare: (a) incremen iente non percepisce non sposta la sua disponibilità a pagare.","groupNote":"(2)(3) Le due strategie aumentano entrambe il margine, ma da lati opposti: il costo lo riduce dal lato dei costi, la differenziazione lo alza dal lato dei ricavi. (4) Una differenza che il cliente non percepisce non sposta la sua disponibilità a pagare. (6) Le economie di scala abbassano il costo MEDIO unitario; i costi totali salgono col volume."},{"id":"c75","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.4","groupTitle":"Vantaggio competitivo e valore","difficulty":"Medium","qnum":"5","question":"Il \"supplier opportunity cost\" è: (a) nessuna delle risposte precedenti; (b) il prezzo massimo che un acquirente è disposto a pagare per ottenere un determinato prodotto o servizio; (c) la più piccola somma che un fornitore è disposto ad accettare per i servizi e le risorse richieste per produrre un bene o servizio.","answerLetters":"c","specificNote":"","groupNote":"(2)(3) Le due strategie aumentano entrambe il margine, ma da lati opposti: il costo lo riduce dal lato dei costi, la differenziazione lo alza dal lato dei ricavi. (4) Una differenza che il cliente non percepisce non sposta la sua disponibilità a pagare. (6) Le economie di scala abbassano il costo MEDIO unitario; i costi totali salgono col volume."},{"id":"c76","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.4","groupTitle":"Vantaggio competitivo e valore","difficulty":"Medium","qnum":"6","question":"Quando un'impresa ottiene economie di scala produttive, significa che è riuscita a diminuire i costi totali di produzione? (a) dipende; (b) vero; (c) FALSO.","answerLetters":"c","specificNote":"Le economie di scala abbassano il costo MEDIO unitario; i costi totali salgono col volume.","groupNote":"(2)(3) Le due strategie aumentano entrambe il margine, ma da lati opposti: il costo lo riduce dal lato dei costi, la differenziazione lo alza dal lato dei ricavi. (4) Una differenza che il cliente non percepisce non sposta la sua disponibilità a pagare. (6) Le economie di scala abbassano il costo MEDIO unitario; i costi totali salgono col volume."},{"id":"c77","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.5","groupTitle":"SWOT, fattori critici, ambiente","difficulty":"Easy","qnum":"1","question":"Secondo la SWOT analysis, quali sono le variabili interne? (a) forza e opportunità; (b) Forza e debolezze; (c) opportunità e minacce.","answerLetters":"b","specificNote":"Interno = forze e debolezze; il criterio è dentro/fuori, non positivo/negativo.","groupNote":"(1) Interno = forze e debolezze; il criterio è dentro/fuori, non positivo/negativo. (3) I fattori critici sono richieste del mercato, non doti dell'impresa. (4) Il bisogno è andare a Roma; il prezzo è il criterio che decide TRA le alternative. (5) \"Possono essere\": l'ambiente non è né tutto controllabile né tutto rilevante."},{"id":"c78","chapter":"IV","chapterTitle":"Analisi competitiva e definizione del business","groupCode":"E5.5","groupTitle":"SWOT, fattori critici, ambiente","difficulty":"Easy","qnum":"2","question":"La SWOT analysis è: (a) uno strumento per valutare l'efficacia delle attività interne della catena del valore; (b) uno strumento per valutare l'efficacia dei collegamenti esterni tra catene del valore; (c) uno strumento per rappresentare in modo sintetico fattori interni ed esterni, che intervengono nelle scelte strategiche delle imprese.","answerLetters":"c","specificNote":"","groupNote":"(1) Interno = forze e debolezze; il criterio è dentro/fuori, non positivo/negativo. (3) I fattori critici sono richieste del mercato, non doti dell'impresa. (4) Il bisogno è andare a Roma; il prezzo è il criterio che decide TRA le alternative. (5) \"Possono essere\": l'ambiente non è né tutto controllabile né tutto rilevante."},{"id":"c79","chapter":"IV","chapterTitle":"Analisi competitiva e definizione de Code":"E6.1","groupTitle":"Kotler e il posizionamento","difficulty":"Medium","qnum":"1","question":"Quando Kotler distingue tra bisogni, desideri e domanda, implica che le imprese abbiano interesse: (a) ad agire a livello della domanda con la leva del prezzo su clienti con pochi soldi, e dei bisogni con promozioni e comunicazioni; (b) ad agire al livello della domanda (con leva del prezzo e della logistica, su clienti che hanno già marca e decisione in testa) e al livello del desiderio (con comunicazione, innovazione di prodotto e di servizio, lavoro sulla marca), mentre il livello dei bisogni è quello al quale le imprese hanno poca possibilità di convenienza ad agire; (c) ad agire al livello dell'offerta, modificando prodotti e servizi, dato che al livello dei bisogni il cliente diventa fidelizzato.","answerLetters":"b","specificNote":"La chiave è la struttura a tre livelli: domanda → prezzo e logistica; desiderio → comunicazione e marca; bisogni → non conviene agire. Le varianti false invertono i livelli o attribuiscono ai bisogni la convenienza ad agire.","groupNote":"(1) La chiave è la struttura a tre livelli: domanda → prezzo e logistica; desiderio → comunicazione e marca; bisogni → non conviene agire. Le varianti false invertono i livelli o attribuiscono ai bisogni la convenienza ad agire. (2) Le posizioni sono percezioni DEI CLIENTI. (3) Qualità/prezzo è la coppia di assi più comune, senza condizioni aggiuntive."},{"id":"c84","chapter":"V","chapterTitle":"Marketing","groupCode":"E6.1","groupTitle":"Kotler e il posizionamento","difficulty":"Medium","qnum":"2","question":"Le mappe di posizionamento: (a) ... le posizioni che i clienti hanno nella segmentazione del mercato; (b) sono visualizzazioni grafiche, di solito rappresentate come assi cartesiani, su cui vengono mostrate le posizioni che i clienti assegnano alle singole marche; (c) ... le posizioni che i concorrenti assegnano alle singole marche.","answerLetters":"b","specificNote":"Le posizioni sono percezioni DEI CLIENTI.","groupNote":"(1) La chiave è la struttura a tre livelli: domanda → prezzo e logistica; desiderio → comunicazione e marca; bisogni → non conviene agire. Le varianti false invertono i livelli o attribuiscono ai bisogni la convenienza ad agire. (2) Le posizioni sono percezioni DEI CLIENTI. (3) Qualità/prezzo è la coppia di assi più comune, senza condizioni aggiuntive."},{"id":"c85","chapter":"V","chapterTitle":"Marketing","groupCode":"E6.1","groupTitle":"Kotler e il posizionamento","difficulty":"Medium","qnum":"3","question":"In una mappa di posizionamento, le variabili analizzate sono qualità e prezzo? (a) È possibile; (b) sì, ma solo a condizione che il prodotto sia molto semplice; (c) no.","answerLetters":"a","specificNote":"Qualità/prezzo è la coppia di assi più comune, senza condizioni aggiuntive.","groupNote":"(1) La chiave è la struttura a tre livelli: domanda → prezzo e logistica; desiderio → comunicazione e marca; bisogni → non conviene agire. Le varianti false invertono i livelli o attribuiscono ai bisogni la convenienza ad agire. (2) Le posizioni sono percezioni DEI CLIENTI. (3) Qualità/prezzo è la coppia di assi più comune, senza condizioni aggiuntive."},{"id":"c86","chapter":"V","chapterTitle":"Marketing","groupCode":"E6.2","groupTitle":"Segmentazione e comportamento d'acquisto","difficulty":"Easy","qnum":"1","question":"Quali caratteristiche deve presentare un segmento affinché la procedura di segmentazione sia utile ed efficace? (a) anzianità; (b) praticabilità; (c) Accessibilità.","answerLetters":"c","specificNote":"","groupNote":"(3) Frequenza d'uso: la misuri dai dati (osservabile) e riguarda quel prodotto (specifica). (4)(5) Il confronto sta nella valutazione delle alternative (stadio 3); la soddisfazione matura DOPO l'acquisto (stadio 5). (6) Rischio fisico e sociale contano entrambi; il consumo edenico è il piacere dell'esperienza in sé."},{"id":"c87","chapter":"V","chapterTitle":"Marketing","groupCode":"E6.2","groupTitle":"Segme le alternative (stadio 3); la soddisfazione matura DOPO l'acquisto (stadio 5). (6) Rischio fisico e sociale contano entrambi; il consumo edenico è il piacere dell'esperienza in sé."},{"id":"c92","chapter":"V","chapterTitle":"Marketing","groupCode":"E6.3","groupTitle":"Distribuzione e servizi","difficulty":"Easy","qnum":"1","question":"Un sistema verticale di marketing ha lo scopo di: (a) diminuire i conflitti tra produttori concorrenti; (b) coordinare le attività distributive con quelle di produzione; (c) coordinare le attività distributive con quelle di produzione e di gestione della marca.","answerLetters":"c","specificNote":"La versione completa include la gestione della marca: il distrattore (b) è la stessa frase amputata — trappola classica del \"quasi giusto\".","groupNote":"(1) La versione completa include la gestione della marca: il distrattore (b) è la stessa frase amputata — trappola classica del \"quasi giusto\". (4) Le due caratteristiche autentiche: niente magazzino, variabilità intrinseca. Le altre opzioni infilano caratteristiche inventate in mezzo a quelle vere."},{"id":"c93","chapter":"V","chapterTitle":"Marketing","groupCode":"E6.3","groupTitle":"Distribuzione e servizi","difficulty":"Easy","qnum":"2","question":"La marca commerciale è: (a) il nome che caratterizza l'insegna di un negozio; (b) la marca di proprietà del produttore, ma venduta attraverso negozi indipendenti; (c) la marca del distributore.","answerLetters":"c","specificNote":"","groupNote":"(1) La versione completa include la gestione della marca: il distrattore (b) è la stessa frase amputata — trappola classica del \"quasi giusto\". (4) Le due caratteristiche autentiche: niente magazzino, variabilità intrinseca. Le altre opzioni infilano caratteristiche inventate in mezzo a quelle vere."},{"id":"c94","chapter":"V","chapterTitle":"Marketing","groupCode":"E6.3","groupTitle":"Distribuzione e servizi","difficulty":"Easy","qnum":"3","question":"La quota numerica di punti vendita è: (a) la percentuale di punti vendita che vendono la categoria di prodotto nella quale opera il produttore; (b) la percentuale di punti vendita che vendono la marca rispetto a tutti i potenziali punti vendita di un certo territorio per quella categoria di prodotto, misura della capillarità del canale; (c) la stessa percentuale, ma come misura di performance dei distributori.","answerLetters":"b","specificNote":"","groupNote":"(1) La versione completa include la gestione della marca: il distrattore (b) è la stessa frase amputata — trappola classica del \"quasi giusto\". (4) Le due caratteristiche autentiche: niente magazzino, variabilità intrinseca. Le altre opzioni infilano caratteristiche inventate in mezzo a quelle vere."},{"id":"c95","chapter":"V","chapterTitle":"Marketing","groupCode":"E6.3","groupTitle":"Distribuzione e servizi","difficulty":"Easy","qnum":"4","question":"Tra le differenze tra prodotti e servizi vi sono caratteristiche della domanda e della relazione con il cliente che provocano conseguenze nella gestione: (a) quali la non immagazzinabilità, la domanda non elastica al prezzo e la capacità produttiva cronicamente in eccesso; (b) quali la non immagazzinabilità del servizio e una variabilità intrinseca e difficile da controllare del servizio \"puro\"; (c) quali la non immagazzinabilità, la capacità produttiva cronicamente in eccesso e la variabilità del servizio.","answerLetters":"b","specificNote":"Le due caratteristiche autentiche: niente magazzino, variabilità intrinseca. Le altre opzioni infilano caratteristiche inventate in mezzo a quelle vere.","groupNote":"(1) La versione completa include la gestione della marca: il distrattore (b) è la stessa frase amputata — trappola classica del \"quasi giusto\". (4) Le due caratteristiche autentiche: niente magazzino, variabilità intrinseca. Le altre opzioni infilano caratteristiche inventate in mezzo a quelle vere."},{"id":"c96","chapter":"V","chapterTitle":"Marketing","groupCode":"E6.4","groupTitle":"Prezzo e punto di pareggio","difficulty":"Hard","qnum":"1","question":"Ipotizzando che il prezzo di un prodotto sia 30, che il suo costo variabile unitario sia 18, che i costi fissi aziendali siano 144: (a) il margine di contribuzione è 14; (b) il punto di pareggio è 14; (c) il punto di pareggio è 12.","answerLetters":"c","specificNote":"Calcolo completo: margine di contribuzione unitario = 30 − 18 = 12 (non 14). Punto di pareggio = costi fissi / margine = 144 / 12 = 12 unità. Verifica: 12 unità × 12 di margine = 144 = costi fissi, profitto zero.","groupNote":"(1) Calcolo completo: margine di contribuzione unitario = 30 − 18 = 12 (non 14). Punto di pareggio = costi fissi / margine = 144 / 12 = 12 unità. Verifica: 12 unità × 12 di margine = 144 = costi fissi, profitto zero. (3) I tre ingredienti del prezzo: domanda + concorrenza + TUTTI i costi (il distrattore (a) limita ai soli fissi)."},{"id":"c97","chapter":"V","chapterTitle":"Marketing","groupCode":"E6.4","groupTitle":"Prezzo e punto di pareggio","difficulty":"Hard","qnum":"2","question":"La definizione del prezzo di vendita di un prodotto, a seguito della stima della funzione di domanda, senza una corretta analisi dei costi: (a) ... ma che non minimizza i profitti; (b) potrebbe portare l'impresa a fissare un prezzo che massimizza le vendite totali, ma che non massimizza i profitti; (c) potrebbe portare a un prezzo che massimizza i profitti unitari, ma non i profitti finali.","answerLetters":"b","specificNote":"","groupNote":"(1) Calcolo completo: margine di contribuzione unitario = 30 − 18 = 12 (non 14). Punto di pareggio = costi fissi / margine = 144 / 12 = 12 unità. Verifica: 12 unità × 12 di margine = 144 = costi fissi, profitto zero. (3) I tre ingredienti del prezzo: domanda + concorrenza + TUTTI i costi (il distrattore (a) limita ai soli fissi)."},{"id":"c98","chapter":"V","chapterTitle":"Marketing","groupCode":"E6.4","groupTitle":"Prezzo e punto di pareggio","difficulty":"Hard","qnum":"3","question":"La definizione del prezzo di vendita deve essere effettuata tenendo conto: (a) della funzione di domanda, della concorrenza, dei costi fissi aziendali; (b) della funzione di domanda e della concorrenza; (c) della funzione di domanda (relazione tra prezzo e quantità acquistata dai clienti, vale a dire quanti prodotti i clienti sono disposti ad acquistare a ogni possibile prezzo), della concorrenza, dei costi aziendali.","answerLetters":"c","specificNote":"I tre ingredienti del prezzo: domanda + concorrenza + TUTTI i costi (il distrattore (a) limita ai soli fissi).","groupNote":"(1) Calcolo completo: margine di contribuzione unitario = 30 − 18 = 12 (non 14). Punto di pareggio = costi fissi / margine = 144 / 12 = 12 unità. Verifica: 12 unità × 12 di margine = 144 = costi fissi, profitto zero. (3) I tre ingredienti del prezzo: domanda + concorrenza + TUTTI i costi (il distrattore (a) limita ai soli fissi)."}]},{"roman":"VI","title":"Economia dell'innovazione","sectionHeading":"7.7 Esercizi (Capitolo VI + quiz)","groups":[{"code":"E7.1","title":"Le quattro tipologie di innovazione","difficulty":"Easy","declaredCount":"4","actualCount":4},{"code":"E7.2","title":"Fonti dell'innovazione e processo","difficulty":"Medium","declaredCount":"6","actualCount":6},{"code":"E7.3","title":"Esternalità di rete, standard, opzioni reali","difficulty":"Medium","declaredCount":"5","actualCount":5},{"code":"E7.4","title":"Protezione e risorse complementari","difficulty":"Hard","declaredCount":"4","actualCount":4},{"code":"E7.5","title":"Blue ocean e business model canvas","difficulty":"Hard","declaredCount":"8","actualCount":8},{"code":"E7.6","title":"Quiz vari su innovazione","difficulty":"Medium","declaredCount":"6","actualCount":6}],"cards":[{"id":"c99","chapter":"VI","chapterTitle":"Economia dell'innovazione","groupCode":"E7.1","groupTitle":"Le quattro tipologie di innovazione","difficulty":"Easy","qnum":"1","question":"Le innovazioni modulari comportano: (a) cambiamenti sostanziali sia dell'architettura, sia della tecnologia; (b) cambiamenti sostanziali dell'architettura, ma nessun cambiamento sostanziale della tecnologia; (c) cambiamenti sostanziali della tecnologia del prodotto, ma nessun cambiamento dell'architettura del prodotto.","answerLetters":"c","specificNote":"","groupNote":"È la matrice 2×2 di §7.1: modulare = solo tecnologia; architetturale = solo architettura; radicale = entrambe; incrementale = nessuna. Le quattro domande sono le quattro celle, e i distrattori di ognuna sono le definizioni delle altre."},{"id":"c100","chapter":"VI","chapterTitle":"Economia dell'innovazione","groupCode":"E7.1","groupTitle":"Le quattro tipologie di innovazione","difficulty":"Easy","qnum":"2","question":"Le innovazioni architetturali comportano: (a) cambiamenti sostanziali sia dell'architettura, sia della tecnologia; (b) cambiamenti sostanziali della tecnologia, ma nessun cambiamento dell'architettura; (c) cambiamenti sostanziali dell'architettura del prodotto, ma nessun cambiamento sostanziale della tecnologia del prodotto.","answerLetters":"c","specificNote":"","groupNote":"È la matrice 2×2 di §7.1: modulare = solo tecnologia; architetturale = solo architettura; radicale = entrambe; incrementale = nessuna. Le quattro domande sono le quattro celle, e i distrattori di ognuna sono le definizioni delle altre."},{"id":"c101","chapter":"VI","chapterTitle":"Economia dell'innovazione","groupCode":"E7.1","groupTitle":"Le quattro tipologie di innovazione","difficulty":"Easy","qnum":"3","question":"Le innovazioni di prodotto radicali comportano: (a) cambiamenti della tecnologia, ma nessun cambiamento dell'architettura; (b) cambiamenti sostanziali dell'architettura, ma nessun cambiamento sostanziale della tecnologia; (c) cambiamenti sostanziali sia dell'architettura, che della tecnologia del prodotto.","answerLetters":"c","specificNote":"","groupNote":"È la matrice 2×2 di §7.1: modulare = solo tecnologia; architetturale = solo architettura; radicale = entrambe; incrementale = nessuna. Le quattro domande sono le quattro celle, e i distrattori di ognuna sono le definizioni delle altre."},{"id":"c102","chapter":"VI","chapterTitle":"Economia dell'innovazione","groupCode":"E7.1","groupTitle":"Le quattro tipologie di innovazione","difficulty":"Easy","qnum":"4","question":"Le innovazioni di prodotto incrementali comportano: (a) nessun cambiamento sostanziale né dell'architettura, né della tecnologia del prodotto; (b) cambiamenti sostanziali sia dell'architettura, che della tecnologia; (c) cambiamenti sostanziali dell'architettura, ma nessun cambiamento sostanziale della tecnologia.","answerLetters":"a","specificNote":"","groupNote":"È la matrice 2×2 di §7.1: modulare = solo tecnologia; architetturale = solo architettura; radicale = entrambe; incrementale = nessuna. Le quattro domande sono le quattro celle, e i distrattori di ognuna sono le definizioni delle altre."},{"id":"c103","chapter":"VI","chapterTitle":"Economia dell'innovazione","groupCode":"E7.2","groupTitle":"Fonti dell'innovazione e processo","difficulty":"Medium","qnum":"1","question":"La rete del valore è: (a) un sistema di produttori, fornitori e utilizzatori di una determinata innovazione; (b) una forma di organizzazione del processo innovativo; (c) un sistema di innovazioni complementari.","answerLetters":"a","specificNote":"La rete del valore = produttori + fornitori + utilizzatori attorno a un'innovazione.","groupNote":"(1) La rete del valore = produttori + fornitori + utilizzatori attorno a un'innovazione. (2) Segui gli incentivi: innova chi ha più da guadagnarci. (5) Le spese entrano (input), i brevetti e i prodotti escono (output)."},{"id":"c104","chapter":"VI","chapterTitle":"Economia dell'innovazione","groupCode":"E7.2","groupTitle":"Fonti dell'innovazione e processo","difficulty":"Medium","qnum":"2","question":"La fonte funzionale di un'innovazione può essere individuata: (a) identificando i soggetti che hanno compreso una nuova opportunità di mercato; (b) identificando i soggetti (individui o organizzazioni) che hanno maggiori incentivi a investire nel processo; (c) identificando i soggetti che hanno compreso una nuova opportunità tecnologica.","answerLetters":"b","specificNote":"Segui gli incentivi: innova chi ha più da guadagnarci.","groupNote":"(1) La rete del valore = produttori + fornitori + utilizzatori attorno a un'innovazione. (2) Segui gli incentivi: innova chi ha più da guadagnarci. (5) Le spese entrano (input), i brevetti e i prodotti escono (output)."},{"id":"c105","chapter":"VI","chapterTitle":"Economia dell'innovazione","groupCode":"E7.2","groupTitle":"Fonti dell'innovazione e processo","difficulty":"Medium","qnum":"3","question":"La creatività individuale è frutto di: (a) della sola conoscenza; (b) conoscenza, intelletto, forma mentis, personalità e ambiente circostante; (c) dell'educazione familiare e degli studi conseguiti.","answerLetters":"b","specificNote":"","groupNote":"(1) La rete del valore = produttori + fornitori + utilizzatori attorno a un'innovazione. (2) Segui gli incentivi: innova chi ha più da guadagnarci. (5) Le spese entrano (input), i brevetti e i prodotti escono (output)."},{"id":"c106","chapter":"VI","chapterTitle":"Economia dell'innovazione","groupCode":"E7.2","groupTitle":"Fonti dell'innovazione e processo","difficulty":"Medium","qnum":"4","question":"Gli utilizzatori: (a) possiedono una profonda conoscenza dei propri bisogni e l'incentivo a escogitare soluzioni capaci di soddisfarli; (b) non sono da considerare nel processo di creazione e sviluppo delle innovazioni; (c) sono pericolosi per la buona riuscita del processo.","answerLetters":"a","specificNote":"","groupNote":"(1) La rete del valore = produttori + fornitori + utilizzatori attorno a un'innovazione. (2) Segui gli incentivi: innova chi ha più da guadagnarci. (5) Le spese entrano (input), i brevetti e i prodotti escono (output)."},{"id":"c107","chapter":"VI","chapterTitle":"Economia dell'innovazione","groupCode":"E7.2","groupTitle":"Fonti dell'innovazione e processo","difficulty":"Medium","qnum":"5","question":"Le spese R&S costituiscono: (a) l'unica fonte di innovazione per l'impresa; (b) l'output del processo innovativo; (c) l'input del processo innovativo.","answerLetters":"c","specificNote":"Le spese entrano (input), i brevetti e i prodotti escono (output).","groupNote":"(1) La rete del valore = produttori + fornitori + utilizzatori attorno a un'innovazione. (2) Segui gli incentivi: innova chi ha più da guadagnarci. (5) Le spese entrano (input), i brevetti e i prodotti escono (output)."},{"id":"c108","chapter":"VI","chapterTitle":"Economia dell'innovazione","groupCode":"E7.2","groupTitle":"Fonti dell'innovazione e processo","difficulty":"Medium","qnum":"6","question":"Perché l'innovazione è importante per un'impresa? (a) perché aiuta a recuperare risorse finanziarie dall'esterno; (b) Perché aumenta il valore di mercato delle imprese; (c) perché aumenta le economie di scala.","answerLetters":"b","specificNote":"","groupNote":"(1) La rete del valore = produttori + fornitori + utilizzatori attorno a un'innovazione. (2) Segui gli incentivi: innova chi ha più da guadagnarci. (5) Le spese entrano (input), i brevetti e i prodotti escono (output)."},{"id":"c109","chapter":"VI","chapterTitle":"Economia dell'innovazione","groupCode":"E7.3","groupTitle":"Esternalità di rete, standard, opzioni reali","difficulty":"Medium","qnum":"1","question":"In presenza di forti esternalità di rete: (a) gli utilizzatori possono facilmente rivedere le loro scelte di acquisto; (b) quando raggiunge una massa critica, non diventa più attraente; (c) quando una tecnologia raggiunge una \"massa critica\" di utilizzatori, diventa molto attraente per nuovi utilizzatori.","answerLetters":"c","specificNote":"","groupNote":"(4) Path dependency: la storia (anche i casi fortuiti iniziali) determina il vincitore. (5) Le opzioni reali valgono di più con MOLTA incertezza — un'opzione è il diritto, non l'obbligo, di proseguire: più g  Sviluppo","groupCode":"E8.3","groupTitle":"Portafoglio, collaborazioni, scenario","difficulty":"Medium","qnum":"2","question":"Qualora il portafoglio risultante dall'analisi condotta con la matrice rischio rendimento non fosse soddisfacente, si può intervenire: (a) ridefinendo le caratteristiche dei progetti; (b) nessuna delle precedenti; (c) riducendo le risorse da investire.","answerLetters":"a","specificNote":"","groupNote":"(1) Tre dimensioni: valore, variabilità del rendimento (= rischio), risorse investite. (3) \"Non competitive\": sicurezza e regolamentazione non sono terreno di gara. (4) La scienza converge tra discipline, non si settorializza: è l'unica delle tre che va contro la tendenza reale."},{"id":"c145","chapter":"VII","chapterTitle":"Ricerca e Sviluppo","groupCode":"E8.3","groupTitle":"Portafoglio, collaborazioni, scenario","difficulty":"Medium","qnum":"3","question":"Le collaborazioni orizzontali tra imprese nella R&S, che riguardano problemi di sicurezza dei prodotti e dei processi e/o di adeguamento alla regolamentazione di settore, sono dette: (a) collaborazioni orizzontali pre-competitive; (b) collaborazioni orizzontali non competitive; (c) collaborazioni orizzontali non profit.","answerLetters":"b","specificNote":"\"Non competitive\": sicurezza e regolamentazione non sono terreno di gara.","groupNote":"(1) Tre dimensioni: valore, variabilità del rendimento (= rischio), risorse investite. (3) \"Non competitive\": sicurezza e regolamentazione non sono terreno di gara. (4) La scienza converge tra discipline, non si settorializza: è l'unica delle tre che va contro la tendenza reale."},{"id":"c146","chapter":"VII","chapterTitle":"Ricerca e Sviluppo","groupCode":"E8.3","groupTitle":"Portafoglio, collaborazioni, scenario","difficulty":"Medium","qnum":"4","question":"Quale tra i seguenti fenomeni non può essere considerato una caratteristica evolutiva dell'attuale scenario scientifico tecnologico? (a) Crescente settorializzazione degli ambiti tecnico

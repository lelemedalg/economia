<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Economia &amp; Gestione d'Impresa — Flashcard</title>
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  --bg: #0a0a0e;
  --surface: #17171d;
  --surface-raised: #1c1c24;
  --border: #27272f;
  --border-soft: #1a1a20;
  --ink: #f5f5f7;
  --ink-soft: #c7c7d1;
  --ink-muted: #8d8d99;
  --ink-faint: #55555f;

  --accent: #8b7cf0;
  --accent-2: #b98ce6;
  --accent-ink: #b6a8ff;
  --accent-wash: linear-gradient(135deg, rgba(139,124,240,0.18), rgba(185,140,230,0.10));
  --accent-wash-strong: linear-gradient(135deg, rgba(139,124,240,0.30), rgba(185,140,230,0.18));
  --accent-ring: rgba(139,124,240,0.32);

  --success: #63c793;
  --success-wash: rgba(99,199,147,0.14);
  --danger: #e58c86;
  --danger-wash: rgba(229,140,134,0.14);
  --favorite: #e6bb69;
  --favorite-wash: rgba(230,187,105,0.14);

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.45);
  --shadow-md: 0 10px 28px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
  --shadow-lg: 0 24px 70px rgba(0,0,0,0.65), 0 0 50px rgba(139,124,240,0.12);
  --shadow-card: inset 0 1px 0 rgba(255,255,255,0.05), 0 1px 2px rgba(0,0,0,0.3), 0 16px 40px rgba(0,0,0,0.5);
  --shadow-glow: 0 14px 34px rgba(0,0,0,0.55), 0 0 0 1px rgba(139,124,240,0.20), 0 0 34px rgba(139,124,240,0.12);

  --surface-gradient: linear-gradient(155deg, #1c1c24 0%, #131318 100%);
  --surface-gradient-raised: linear-gradient(155deg, #212129 0%, #16161c 100%);

  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

body {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-weight: 400;
  background-color: #08080b;
  background-image:
    radial-gradient(1100px 650px at 6% -14%, rgba(139,124,240,0.16), transparent 60%),
    radial-gradient(900px 620px at 106% 6%, rgba(185,140,230,0.09), transparent 55%),
    radial-gradient(760px 520px at 46% 118%, rgba(111,95,224,0.08), transparent 60%),
    linear-gradient(180deg, #0a0a0e 0%, #07070a 100%);
  background-attachment: fixed;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

b, strong, .bold { font-weight: 700; }

::selection { background: var(--accent-ring); }

button { font-family: inherit; cursor: pointer; }

/* ============================================================
   LAYOUT
   ============================================================ */
.app {
  display: grid;
  grid-template-columns: 272px 1fr;
  height: 100vh;
  width: 100%;
}

/* ---------- SIDEBAR ---------- */
.sidebar {
  border-right: 1px solid var(--border);
  background: linear-gradient(180deg, #131318 0%, #0d0d11 100%);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 20px 16px;
}

.brand-mark {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(109,111,216,0.35);
}

.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
  min-width: 0;
}

.brand-title {
  font-weight: 700;
  font-size: 13.5px;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.brand-sub {
  font-size: 11px;
  color: var(--ink-muted);
}

.search-trigger {
  margin: 0 16px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--ink-muted);
  font-size: 13px;
  transition: border-color .15s var(--ease-out), background .15s var(--ease-out);
}
.search-trigger:hover {
  border-color: var(--accent);
  background: var(--surface);
}
.search-trigger svg { flex-shrink: 0; color: var(--ink-muted); }
.search-trigger span.label { flex: 1; text-align: left; }
.kbd-hint {
  display: flex;
  gap: 2px;
}
.kbd {
  font-size: 10.5px;
  font-weight: 700;
  color: var(--ink-muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  line-height: 1.5;
}

.sidebar-nav {
  padding: 0 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  color: var(--ink-soft);
  font-size: 13.5px;
  font-weight: 400;
  background: transparent;
  border: none;
  width: 100%;
  text-align: left;
  transition: background .12s var(--ease-out), color .12s var(--ease-out);
}
.nav-item svg { flex-shrink: 0; color: var(--ink-muted); transition: color .2s var(--ease-out); }
.nav-item:hover { background: var(--border-soft); }
.nav-item.active {
  background: var(--accent-wash);
  color: var(--accent-ink);
  font-weight: 700;
  box-shadow: inset 0 0 0 1px rgba(139,124,240,0.20);
}
.nav-item.active svg { color: var(--accent-ink); }
.nav-item .count {
  margin-left: auto;
  font-size: 11px;
  color: var(--ink-faint);
  font-weight: 700;
}
.nav-item.active .count { color: var(--accent-ink); opacity: .7; }

.sidebar-divider {
  margin: 16px 20px 8px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--ink-faint);
  text-transform: uppercase;
}

.chapter-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.chapter-list::-webkit-scrollbar { width: 6px; }
.chapter-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.chapter-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  width: 100%;
  min-width: 0;
  overflow: hidden;
  text-align: left;
  transition: background .12s var(--ease-out);
}
.chapter-item:hover { background: var(--border-soft); }
.chapter-item.active { background: var(--accent-wash); box-shadow: inset 0 0 0 1px rgba(139,124,240,0.20); }

.chapter-item-top {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  min-width: 0;
}
.chapter-roman {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent-ink);
  background: rgba(139,124,240,0.16);
  border: 1px solid rgba(139,124,240,0.26);
  border-radius: 6px;
  padding: 2px 5px;
  min-width: 22px;
  text-align: center;
  flex-shrink: 0;
}
.chapter-item.active .chapter-roman {
  border-color: transparent;
  background: var(--accent);
  color: #fff;
}
.chapter-name {
  font-size: 12.5px;
  color: var(--ink-soft);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chapter-item.active .chapter-name { color: var(--ink); font-weight: 700; }
.chapter-count {
  font-size: 10.5px;
  color: var(--ink-faint);
  font-weight: 700;
  flex-shrink: 0;
}
.chapter-progress-track {
  height: 3px;
  border-radius: 3px;
  background: var(--border-soft);
  overflow: hidden;
}
.chapter-progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  transition: width .5s var(--ease-out);
}

.sidebar-footer {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border-soft);
  font-size: 11px;
  color: var(--ink-faint);
}

/* ---------- MAIN ---------- */
.main {
  height: 100vh;
  min-width: 0;
  overflow-y: auto;
  position: relative;
}

.view {
  max-width: 1080px;
  margin: 0 auto;
  padding: 40px 48px 80px;
}

.view.narrow { max-width: 720px; }

/* fade/slide in for whole views */
.view-enter {
  animation: viewIn .38s var(--ease-out) both;
}
@keyframes viewIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   DASHBOARD
   ============================================================ */
.dash-hero {
  margin-bottom: 32px;
}
.dash-eyebrow {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-ink);
  letter-spacing: .04em;
  margin-bottom: 6px;
}
.dash-title {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -.01em;
  margin-bottom: 6px;
}
.dash-subtitle {
  font-size: 14.5px;
  color: var(--ink-muted);
  max-width: 560px;
  line-height: 1.5;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 36px;
  min-width: 0;
}
.stat-grid > * {
  min-width: 0;
}
.stat-card {
  background: var(--surface-gradient);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.stat-card.accent {
  background: var(--accent-wash);
  border-color: rgba(139,124,240,0.22);
  backdrop-filter: blur(16px);
  box-shadow: var(--shadow-glow);
}
.stat-icon {
  width: 30px; height: 30px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  color: var(--accent-ink);
  margin-bottom: 14px;
}
.stat-card.accent .stat-icon { background: rgba(255,255,255,0.10); color: var(--accent-ink); backdrop-filter: blur(8px); }
.stat-value {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.01em;
  line-height: 1;
  margin-bottom: 5px;
}
.stat-label {
  font-size: 12px;
  color: var(--ink-muted);
}

.dash-grid {
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 20px;
  align-items: start;
  min-width: 0;
}
.dash-grid > * {
  min-width: 0;
}

.panel {
  background: var(--surface-gradient);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px 22px 8px;
}
.panel-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
}
.panel-title {
  font-size: 15px;
  font-weight: 700;
}
.panel-link {
  font-size: 12px;
  color: var(--accent-ink);
  font-weight: 700;
  background: none;
  border: none;
}
.panel-link:hover { text-decoration: underline; }

.chapter-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 1px solid var(--border-soft);
  background: none;
  border-left: none; border-right: none; border-top: none;
  width: 100%;
  min-width: 0;
  text-align: left;
}
.chapter-row:last-child { border-bottom: none; }
.chapter-row:hover { opacity: .7; }
.chapter-row-roman {
  font-size: 10.5px;
  font-weight: 700;
  color: var(--accent-ink);
  background: var(--accent-wash);
  border-radius: 6px;
  padding: 3px 6px;
  min-width: 24px;
  text-align: center;
  flex-shrink: 0;
}
.chapter-row-info { flex: 1; min-width: 0; }
.chapter-row-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 5px;
}
.chapter-row-track {
  height: 4px;
  border-radius: 3px;
  background: var(--border-soft);
  overflow: hidden;
}
.chapter-row-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
}
.chapter-row-pct {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-muted);
  width: 34px;
  text-align: right;
  flex-shrink: 0;
}

.side-panel-block {
  padding-bottom: 20px;
}
.mini-stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-soft);
  font-size: 13px;
}
.mini-stat-row:last-child { border-bottom: none; }
.mini-stat-label { color: var(--ink-muted); display: flex; align-items: center; gap: 8px; }
.mini-stat-value { font-weight: 700; }
.mini-stat-value.success { color: var(--success); }
.mini-stat-value.danger { color: var(--danger); }
.mini-stat-value.favorite { color: var(--favorite); }

.cta-shuffle {
  margin-top: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 20px 22px;
  border-radius: var(--radius-lg);
  background: var(--accent-wash-strong);
  border: 1px solid rgba(139,124,240,0.22);
  backdrop-filter: blur(16px);
  box-shadow: var(--shadow-glow);
}
.cta-shuffle-text { }
.cta-shuffle-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.cta-shuffle-sub { font-size: 12.5px; color: var(--ink-muted); }
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: linear-gradient(135deg, #7a68e8 0%, #a06fd6 100%);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
  transition: transform .12s var(--ease-out), box-shadow .12s var(--ease-out);
  box-shadow: 0 4px 18px rgba(139,124,240,0.35);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(139,124,240,0.45); }
.btn-primary:active { transform: translateY(0); }

/* ============================================================
   TOPBAR (study views)
   ============================================================ */
.topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}
.btn-back {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 7px 11px 7px 9px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--ink-soft);
  flex-shrink: 0;
}
.btn-back:hover { background: var(--border-soft); }

.topbar-titles { flex: 1; min-width: 0; }
.topbar-eyebrow { font-size: 11px; color: var(--ink-muted); font-weight: 700; letter-spacing: .03em; }
.topbar-title { font-size: 19px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.topbar-progress {
  flex-shrink: 0;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--ink-muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 12px;
}
.topbar-progress b { color: var(--ink); }

.progress-track {
  height: 5px;
  background: var(--border-soft);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 22px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: 4px;
  transition: width .5s var(--ease-out);
}

/* ---------- filter chips ---------- */
.chip-row {
  display: flex;
  gap: 8px;
  margin-bottom: 26px;
  flex-wrap: wrap;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 12.5px;
  font-weight: 700;
  color: var(--ink-soft);
}
.chip:hover { border-color: var(--accent); color: var(--accent-ink); }
.chip.active {
  background: linear-gradient(135deg, #7a68e8, #a06fd6);
  border-color: transparent;
  color: #fff;
}
.chip .chip-count { color: var(--ink-faint); font-weight: 700; }
.chip.active .chip-count { color: rgba(255,255,255,0.55); }

/* ============================================================
   FLASHCARD
   ============================================================ */
.card-stage {
  margin-bottom: 26px;
}
.flashcard {
  position: relative;
  min-height: 340px;
  width: 100%;
  cursor: pointer;
  overflow: hidden;
  transition: height .28s var(--ease-out);
}

.flashcard.entering {
  animation: cardEnter .42s var(--ease-out) both;
}
@keyframes cardEnter {
  from { opacity: 0; transform: translateY(14px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card-face {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  background: var(--surface-gradient);
  box-shadow: var(--shadow-card);
  padding: 34px 38px;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity .16s ease-out, box-shadow .25s var(--ease-out);
}

.card-front {
  background: var(--surface-gradient);
  opacity: 1;
  pointer-events: auto;
}
.card-back {
  background:
    linear-gradient(155deg, rgba(139,124,240,0.20) 0%, rgba(185,140,230,0.08) 40%, rgba(10,10,14,0.2) 100%),
    var(--surface-gradient);
  border-color: rgba(139,124,240,0.28);
  box-shadow: var(--shadow-card), 0 0 40px rgba(139,124,240,0.08);
}
.flashcard.flipped .card-front { opacity: 0; pointer-events: none; }
.flashcard.flipped .card-back { opacity: 1; pointer-events: auto; }

.card-meta-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.pill {
  font-size: 10.5px;
  font-weight: 700;
  padding: 4px 9px;
  border-radius: 20px;
  letter-spacing: .01em;
}
.pill-chapter { background: var(--bg); color: var(--ink-muted); border: 1px solid var(--border); }
.pill-diff-easy { background: var(--success-wash); color: var(--success); }
.pill-diff-medium { background: var(--favorite-wash); color: var(--favorite); }
.pill-diff-hard { background: var(--danger-wash); color: var(--danger); }
.card-back .pill-chapter { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.10); color: var(--ink-soft); }

.card-star-btn {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--ink-faint);
  display: flex;
  padding: 2px;
  transition: transform .15s var(--ease-spring), color .15s;
}
.card-star-btn:hover { transform: scale(1.15); }
.card-star-btn.active { color: var(--favorite); }

.card-question {
  font-size: 17px;
  line-height: 1.6;
  color: var(--ink);
  flex: 1;
}
.card-question .qnum-badge {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border-radius: 7px;
  background: var(--accent-wash);
  color: var(--accent-ink);
  font-size: 11px;
  font-weight: 700;
  margin-right: 8px;
  vertical-align: middle;
  transform: translateY(-2px);
}

.card-hint {
  margin-top: 18px;
  font-size: 12px;
  color: var(--ink-faint);
  display: flex;
  align-items: center;
  gap: 6px;
}

.option-select-row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.option-btn {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--ink-soft);
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .16s var(--ease-spring), background .18s var(--ease-out),
              border-color .18s var(--ease-out), color .18s var(--ease-out);
}
.option-btn:not([disabled]):hover {
  border-color: var(--accent);
  color: var(--accent-ink);
  transform: translateY(-2px);
}
.option-btn:not([disabled]):active { transform: scale(0.94); }
.option-btn.selected {
  background: linear-gradient(135deg, #7a68e8, #a06fd6);
  border-color: transparent;
  color: #fff;
}
.option-btn[disabled] { cursor: default; }
.option-btn.result.correct {
  background: var(--success-wash);
  border-color: var(--success);
  color: var(--success);
}
.option-btn.result.wrong {
  background: var(--danger-wash);
  border-color: var(--danger);
  color: var(--danger);
}

.card-answer-block { flex: 1; }
.answer-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.answer-badge .letter {
  width: 22px; height: 22px;
  border-radius: 7px;
  background: var(--success);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.answer-note {
  font-size: 14.5px;
  line-height: 1.65;
  color: var(--ink-soft);
  white-space: pre-line;
}
.answer-note strong { color: var(--ink); }
.group-note-toggle {
  margin-top: 16px;
  background: rgba(139,124,240,0.14);
  border: 1px solid rgba(139,124,240,0.25);
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-ink);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.group-note-body {
  margin-top: 10px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink-soft);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 12px 14px;
  white-space: pre-line;
}

/* ---------- controls ---------- */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 14px;
}
.ctrl-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 11px 18px;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-soft);
  transition: transform .12s var(--ease-out), box-shadow .12s var(--ease-out), background .12s;
}
.ctrl-btn:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }
.ctrl-btn:disabled { opacity: .35; pointer-events: none; }
.ctrl-btn.primary {
  background: linear-gradient(135deg, #7a68e8 0%, #a06fd6 100%);
  color: #fff;
  border-color: transparent;
  padding: 11px 24px;
  box-shadow: 0 4px 18px rgba(139,124,240,0.32);
}
.ctrl-btn.primary:hover { box-shadow: 0 8px 24px rgba(139,124,240,0.42); }
.ctrl-btn.icon-only { padding: 11px; }

.grade-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.grade-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 9px 16px;
  font-size: 12.5px;
  font-weight: 700;
}
.grade-btn.correct { color: var(--success); }
.grade-btn.correct:hover, .grade-btn.correct.active { background: var(--success-wash); border-color: var(--success); }
.grade-btn.wrong { color: var(--danger); }
.grade-btn.wrong:hover, .grade-btn.wrong.active { background: var(--danger-wash); border-color: var(--danger); }
.grade-btn.fav { color: var(--favorite); }
.grade-btn.fav:hover, .grade-btn.fav.active { background: var(--favorite-wash); border-color: var(--favorite); }

.keyboard-hints {
  margin-top: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  font-size: 11.5px;
  color: var(--ink-faint);
  flex-wrap: wrap;
}
.keyboard-hints span { display: flex; align-items: center; gap: 5px; }

.empty-state {
  text-align: center;
  padding: 70px 20px;
  color: var(--ink-muted);
}
.empty-state svg { color: var(--ink-faint); margin-bottom: 14px; }
.empty-state-title { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.empty-state-sub { font-size: 13px; max-width: 340px; margin: 0 auto; line-height: 1.5; }

/* ============================================================
   COMMAND PALETTE
   ============================================================ */
.palette-overlay {
  position: fixed; inset: 0;
  background: rgba(4,4,6,0.65);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 12vh;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .18s var(--ease-out);
}
.palette-overlay.open { opacity: 1; pointer-events: auto; }
.palette {
  width: 100%;
  max-width: 560px;
  background: var(--surface-gradient-raised);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  overflow: hidden;
  transform: translateY(-8px) scale(.98);
  transition: transform .28s var(--ease-spring);
}
.palette-overlay.open .palette { transform: translateY(0) scale(1); }

.palette-input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.palette-input-row svg { color: var(--ink-muted); flex-shrink: 0; }
.palette-input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 15px;
  font-family: inherit;
  color: var(--ink);
  background: transparent;
}
.palette-input::placeholder { color: var(--ink-faint); }
.palette-esc {
  font-size: 10.5px;
  font-weight: 700;
  color: var(--ink-muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2px 6px;
}

.palette-results {
  max-height: 400px;
  overflow-y: auto;
  padding: 8px;
}
.palette-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-muted);
  font-size: 13px;
}
.palette-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px 12px;
  border-radius: 10px;
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
}
.palette-item.selected { background: var(--accent-wash); }
.palette-item-top { display: flex; align-items: center; gap: 8px; }
.palette-item-text {
  font-size: 13.5px;
  color: var(--ink);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.palette-item-text mark {
  background: #e6bb69;
  color: #1c1509;
  border-radius: 2px;
  padding: 0 1px;
}
.palette-item-meta {
  font-size: 11px;
  color: var(--ink-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.palette-footer {
  border-top: 1px solid var(--border-soft);
  padding: 9px 18px;
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: var(--ink-faint);
}
.palette-footer span { display: flex; align-items: center; gap: 5px; }

/* toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: linear-gradient(135deg, #1e1a30 0%, #16141f 100%);
  border: 1px solid rgba(139,124,240,0.30);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  padding: 10px 18px;
  border-radius: 30px;
  box-shadow: var(--shadow-lg);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s var(--ease-spring), transform .3s var(--ease-spring);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ============================================================
   MOBILE TOPBAR + SIDEBAR DRAWER (hidden on desktop by default)
   ============================================================ */
.mobile-topbar { display: none; }
.sidebar-backdrop { display: none; }
.sidebar-close-btn { display: none; }

@media (max-width: 900px) {
  html, body { overflow-x: hidden; overflow-y: visible; height: auto; }
  .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }

  .mobile-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 14px;
    background: linear-gradient(180deg, #131318 0%, #0d0d11 100%);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 40;
  }
  .mobile-icon-btn {
    display: flex; align-items: center; justify-content: center;
    width: 38px; height: 38px;
    border-radius: 10px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink-soft);
    flex-shrink: 0;
    transition: background .15s var(--ease-out), transform .15s var(--ease-spring);
  }
  .mobile-icon-btn:hover { background: var(--border-soft); }
  .mobile-icon-btn:active { transform: scale(0.92); }
  .mobile-topbar-brand { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .mobile-topbar-title { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .brand-mark.small { width: 24px; height: 24px; font-size: 11px; border-radius: 7px; flex-shrink: 0; }

  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: min(300px, 84vw);
    height: 100vh;
    z-index: 60;
    transform: translateX(-104%);
    transition: transform .32s var(--ease-out);
    box-shadow: none;
  }
  .sidebar.mobile-open {
    transform: translateX(0);
    box-shadow: 24px 0 60px rgba(0,0,0,0.5);
  }
  .sidebar-close-btn {
    display: flex;
    margin-left: auto;
  }
  .sidebar-brand { padding: 18px 16px 14px; }

  .sidebar-backdrop {
    display: block;
    position: fixed; inset: 0;
    background: rgba(4,4,6,0.6);
    backdrop-filter: blur(3px);
    z-index: 55;
    opacity: 0;
    pointer-events: none;
    transition: opacity .28s var(--ease-out);
  }
  .sidebar-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }

  .main { height: auto; overflow: visible; }
  .view { padding: 22px 18px 60px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-grid { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .view { padding: 18px 14px 52px; }
  .dash-title { font-size: 24px; }
  .stat-grid { gap: 10px; }
  .stat-card { padding: 15px 16px; }
  .stat-value { font-size: 22px; }
  .flashcard { min-height: 300px; }
  .card-face { padding: 24px 22px; }
  .card-question { font-size: 15.5px; }
  .controls-row { flex-wrap: wrap; gap: 8px; }
  .ctrl-btn.primary { flex: 1 1 auto; order: -1; }
  .grade-row { flex-wrap: wrap; }
  .grade-btn { flex: 1 1 auto; justify-content: center; }
  .keyboard-hints { display: none; }
  .topbar { flex-wrap: wrap; gap: 10px; }
  .topbar-title { font-size: 16.5px; }
  .chip-row { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; }
  .resume-banner { flex-wrap: wrap; }
  .cta-shuffle { flex-direction: column; align-items: flex-start; gap: 12px; }
  .cta-shuffle .btn-primary { width: 100%; justify-content: center; }
}

@media (max-width: 400px) {
  .stat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .view { padding: 16px 12px 48px; }
  .palette-overlay { padding-top: 6vh; padding-left: 10px; padding-right: 10px; }
}

/* ============================================================
   MOTION SYSTEM — micro-interactions, stagger, transitions
   ============================================================ */

/* tactile press feedback on every interactive control */
.ctrl-btn, .btn-primary, .chip, .nav-item, .chapter-item, .chapter-row,
.grade-btn, .btn-back, .card-star-btn, .search-trigger, .palette-item,
.group-note-toggle, .panel-link {
  transition: transform .2s var(--ease-spring), background .22s var(--ease-out),
              box-shadow .22s var(--ease-out), border-color .22s var(--ease-out), color .2s var(--ease-out),
              opacity .2s var(--ease-out);
}
.ctrl-btn:active, .btn-primary:active, .chip:active, .nav-item:active,
.chapter-item:active, .chapter-row:active, .grade-btn:active, .btn-back:active,
.card-star-btn:active, .search-trigger:active, .palette-item:active {
  transform: scale(0.95);
}

/* hoverable cards lift */
.stat-card, .panel, .cta-shuffle, .resume-banner {
  transition: transform .3s var(--ease-spring), box-shadow .28s var(--ease-out), border-color .28s var(--ease-out);
}
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.resume-banner:hover, .cta-shuffle:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.chapter-row:hover, .chapter-item:hover { transform: translateX(2px); }
.palette-item:hover { transform: translateX(2px); }

/* dashboard stagger-in */
@keyframes staggerUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.stat-grid .stat-card, .dash-grid .chapter-row, .chapter-list .chapter-item {
  animation: staggerUp .46s var(--ease-out) both;
}
.stat-grid .stat-card:nth-child(1) { animation-delay: .00s; }
.stat-grid .stat-card:nth-child(2) { animation-delay: .05s; }
.stat-grid .stat-card:nth-child(3) { animation-delay: .10s; }
.stat-grid .stat-card:nth-child(4) { animation-delay: .15s; }
.dash-grid .chapter-row:nth-child(1)  { animation-delay: .04s; }
.dash-grid .chapter-row:nth-child(2)  { animation-delay: .07s; }
.dash-grid .chapter-row:nth-child(3)  { animation-delay: .10s; }
.dash-grid .chapter-row:nth-child(4)  { animation-delay: .13s; }
.dash-grid .chapter-row:nth-child(5)  { animation-delay: .16s; }
.dash-grid .chapter-row:nth-child(6)  { animation-delay: .19s; }
.dash-grid .chapter-row:nth-child(7)  { animation-delay: .22s; }
.dash-grid .chapter-row:nth-child(8)  { animation-delay: .25s; }
.dash-grid .chapter-row:nth-child(9)  { animation-delay: .28s; }
.dash-grid .chapter-row:nth-child(10) { animation-delay: .31s; }
.dash-grid .chapter-row:nth-child(11) { animation-delay: .34s; }
.chapter-list .chapter-item:nth-child(1)  { animation-delay: .02s; }
.chapter-list .chapter-item:nth-child(2)  { animation-delay: .05s; }
.chapter-list .chapter-item:nth-child(3)  { animation-delay: .08s; }
.chapter-list .chapter-item:nth-child(4)  { animation-delay: .11s; }
.chapter-list .chapter-item:nth-child(5)  { animation-delay: .14s; }
.chapter-list .chapter-item:nth-child(6)  { animation-delay: .17s; }
.chapter-list .chapter-item:nth-child(7)  { animation-delay: .20s; }
.chapter-list .chapter-item:nth-child(8)  { animation-delay: .23s; }
.chapter-list .chapter-item:nth-child(9)  { animation-delay: .26s; }
.chapter-list .chapter-item:nth-child(10) { animation-delay: .29s; }
.chapter-list .chapter-item:nth-child(11) { animation-delay: .32s; }

/* directional flashcard transitions (next / prev) */
@keyframes slideInFromRight {
  from { opacity: 0; transform: translateX(30px) scale(.98); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes slideInFromLeft {
  from { opacity: 0; transform: translateX(-30px) scale(.98); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
.flashcard.entering-next { animation: slideInFromRight .38s var(--ease-out) both; }
.flashcard.entering-prev { animation: slideInFromLeft .38s var(--ease-out) both; }
.flashcard:hover .card-front { box-shadow: var(--shadow-lg); }

/* favorite star pop */
@keyframes popScale {
  0%   { transform: scale(1) rotate(0); }
  35%  { transform: scale(1.55) rotate(-10deg); }
  65%  { transform: scale(.88) rotate(6deg); }
  100% { transform: scale(1) rotate(0); }
}
.card-star-btn.pop, .grade-btn.fav.pop { animation: popScale .5s var(--ease-spring); }

/* grade button pulse + card face flash */
@keyframes gradePulse {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}
.grade-btn.pulse { animation: gradePulse .34s var(--ease-spring); }

@keyframes ringFlashGood {
  0%   { box-shadow: var(--shadow-card), 0 0 0 0 rgba(99,199,147,0); }
  35%  { box-shadow: var(--shadow-card), 0 0 0 9px rgba(99,199,147,0.28), 0 0 26px rgba(99,199,147,0.25); }
  100% { box-shadow: var(--shadow-card), 0 0 0 0 rgba(99,199,147,0); }
}
@keyframes ringFlashBad {
  0%   { box-shadow: var(--shadow-card), 0 0 0 0 rgba(229,140,134,0); }
  35%  { box-shadow: var(--shadow-card), 0 0 0 9px rgba(229,140,134,0.28), 0 0 26px rgba(229,140,134,0.25); }
  100% { box-shadow: var(--shadow-card), 0 0 0 0 rgba(229,140,134,0); }
}
.card-face.flash-good { animation: ringFlashGood .55s ease-out; }
.card-face.flash-bad { animation: ringFlashBad .55s ease-out; }

/* progress fill glow on update */
@keyframes fillGlow {
  0%   { filter: brightness(1); }
  40%  { filter: brightness(1.4); }
  100% { filter: brightness(1); }
}
.progress-fill.glow, .chapter-progress-fill.glow, .chapter-row-fill.glow { animation: fillGlow .6s ease-out; }

/* flip button icon spin */
.flip-icon { transition: transform .4s var(--ease-spring); display: inline-flex; }
.flip-icon.spun { transform: rotate(180deg); }

/* resume banner */
.resume-banner {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  min-width: 0;
  text-align: left;
  background: var(--surface-gradient);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 18px;
  animation: staggerUp .4s var(--ease-out) both;
}
.resume-banner-icon {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: var(--accent-wash-strong);
  color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.resume-banner-text { flex: 1; min-width: 0; }
.resume-banner-title { font-size: 13.5px; font-weight: 700; margin-bottom: 2px; }
.resume-banner-sub { font-size: 12px; color: var(--ink-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.resume-banner-cta {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 4px;
  font-size: 12.5px; font-weight: 700;
  color: var(--accent-ink);
}

/* confetti */
.confetti-piece {
  position: fixed;
  width: 7px; height: 7px;
  pointer-events: none;
  z-index: 300;
  animation: confettiBurst .95s var(--ease-out) forwards;
}
@keyframes confettiBurst {
  0%   { opacity: 1; transform: translate(0,0) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); }
}

/* view-level crossfade (native View Transitions, progressively enhanced) */
::view-transition-old(root) { animation: viewFadeOut .22s var(--ease-out) both; }
::view-transition-new(root) { animation: viewFadeIn .28s var(--ease-out) both; }
@keyframes viewFadeOut { to { opacity: 0; transform: translateY(-4px); } }
@keyframes viewFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* empty state cta */
.empty-state .btn-primary { margin-top: 18px; }

</style>
</head>

ami.","groupNote":"(1) Margine = valore meno costi: senza il \"netto\" la definizione è incompleta. (2) Conta la doppia abilità: svolgere l'attività E gestirne i legami. (3) La formulazione marcata ammette legami primarie↔supporto e primarie↔primarie. (4) È la \"torta del valore\": disponibilità a pagare massima meno disponibilità a cedere minima. (5) Le informazioni sono costruite per rispondere a quesiti, non semplicemente disponibili."},{"id":"c12","chapter":"I","chapterTitle":"Strategia e vantaggio competitivo","groupCode":"E2.3","groupTitle":"Margine, valore, legami, informazioni","difficulty":"Medium","qnum":"3","question":"Nella catena del valore possono esistere legami esclusivamente tra: (a) attività primarie e attività a supporto, o tra le diverse attività primarie; (b) attività primarie; (c) attività primarie e attività a supporto, o tra le diverse attività di supporto.","answerLetters":"a","specificNote":"La formulazione marcata ammette legami primarie↔supporto e primarie↔primarie.","groupNote":"(1) Margine = valore meno costi: senza il \"netto\" la definizione è incompleta. (2) Conta la doppia abilità: svolgere l'attività E gestirne i legami. (3) La formulazione marcata ammette legami primarie↔supporto e primarie↔primarie. (4) È la \"torta del valore\": disponibilità a pagare massima meno disponibilità a cedere minima. (5) Le informazioni sono costruite per rispondere a quesiti, non semplicemente disponibili."},{"id":"c13","chapter":"I","chapterTitle":"Strategia e vantaggio competitivo","groupCode":"E2.3","groupTitle":"Margine, valore, legami, informazioni","difficulty":"Medium","qnum":"4","question":"Il valore creato dall'azienda è quantificabile come: (a) nessuna delle risposte precedenti; (b) il prezzo di vendita del prodotto finale nell'ultimo stadio della filiera produttiva; (c) la differenza tra il prezzo massimo che l'acquirente di un dato bene o servizio è disposto a pagare e l'ammontare minimo a cui un fornitore è disposto a cedere un bene o un

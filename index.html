fettosità di produzione; (b) alimentare il materiale a una linea di produzione; (c) ridurre il tempo di attrezzaggio delle macchine.","answerLetters":"c","specificNote":"","groupNote":"(1) I cinque principi non contengono parole giapponesi. (3) Pull = tira il cliente; push = spinge il piano. (5) Il kanban segue il consumo reale: né calendario né quantità predeterminate a piano."},{"id":"c149","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.1","groupTitle":"Principi e strumenti lean","difficulty":"Easy","qnum":"3","question":"La logica pull prevede che il materiale venga ordinato: (a) in base all'ordine del cliente; (b) molto spesso; (c) in base al piano di produzione.","answerLetters":"a","specificNote":"Pull = tira il cliente; push = spinge il piano.","groupNote":"(1) I cinque principi non contengono parole giapponesi. (3) Pull = tira il cliente; push = spinge il piano. (5) Il kanban segue il consumo reale: né calendario né quantità predeterminate a piano."},{"id":"c150","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.1","groupTitle":"Principi e strumenti lean","difficulty":"Easy","qnum":"4","question":"Il value stream mapping è una tecnica che permette di: (a) analizzare i trasporti; (b) analizzare congiuntamente il flusso dei materiali e delle informazioni; (c) ridurre il tempo di ciclo di lavorazione.","answerLetters":"b","specificNote":"","groupNote":"(1) I cinque principi non contengono parole giapponesi. (3) Pull = tira il cliente; push = spinge il piano. (5) Il kanban segue il consumo reale: né calendario né quantità predeterminate a piano."},{"id":"c151","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.1","groupTitle":"Principi e strumenti lean","difficulty":"Easy","qnum":"5","question":"Il kanban è uno strumento con cui il materiale: (a) viene ordinato solo a cadenze fisse; (b) viene ordinato solo a quantità fisse; (c) viene ordinato in base al consumo.","answerLetters":"c","specificNote":"Il kanban segue il consumo reale: né calendario né quantità predeterminate a piano.","groupNote":"(1) I cinque principi non contengono parole giapponesi. (3) Pull = tira il cliente; push = spinge il piano. (5) Il kanban segue il consumo reale: né calendario né quantità predeterminate a piano."},{"id":"c152","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.2","groupTitle":"Muda, kaizen, organizzazione","difficulty":"Medium","qnum":"1","question":"La movimentazione dei materiali è: (a) muda eliminabile; (b) valore aggiunto; (c) muda riducibile.","answerLetters":"c","specificNote":"","groupNote":"(1)(2) Movimentare serve ancora (riducibile col layout); il controllo finale è sostituibile dalla qualità nel processo (eliminabile). (5) Nella cella l'operatore segue il pezzo su più macchine: polivalenza. (6) La manutenzione su guasto resta razionale per componenti non critici: diffida delle risposte con \"sempre\" e \"mai\"."},{"id":"c153","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.2","groupTitle":"Muda, kaizen, organizzazione","difficulty":"Medium","qnum":"2","question":"Un controllo di fine linea è: (a) muda riducibile; (b) valore aggiunto; (c) muda eliminabile.","answerLetters":"c","specificNote":"Movimentare serve ancora (riducibile col layout); il controllo finale è sostituibile dalla qualità nel processo (eliminabile).","groupNote":"(1)(2) Movimentare serve ancora (riducibile col layout); il controllo finale è sostituibile dalla qualità nel processo (eliminabile). (5) Nella cella l'operatore segue il pezzo su più macchine: polivalenza. (6) La manutenzione su guasto resta razionale per componenti non critici: diffida delle risposte con \"sempre\" e \"mai\"."},{"id":"c154","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.2","groupTitle":"Muda, kaizen, organizzazione","difficulty":"Medium","qnum":"3","question":"Un approccio kaizen prevede: (a) entrambe le risposte: la partecipazione di tutti i livelli della struttura e miglioramenti senza rilevanti investimenti; (b) solo la partecipazione di tutti i livelli; (c) solo miglioramenti senza investimenti rilevanti.","answerLetters":"a","specificNote":"","groupNote":"(1)(2) Movimentare serve ancora (riducibile col layout); il controllo finale è sostituibile dalla qualità nel processo (eliminabile). (5) Nella cella l'operatore segue il pezzo su più macchine: polivalenza. (6) La manutenzione su guasto resta razionale per componenti non critici: diffida delle risposte con \"sempre\" e \"mai\"."},{"id":"c155","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.2","groupTitle":"Muda, kaizen, organizzazione","difficulty":"Medium","qnum":"4","question":"La creazione di celle di lavoro è finalizzata a: (a) solo ridurre i lead time; (b) solo ridurre le superfici; (c) entrambe: ridurre le superfici occupate e ridurre i lead time.","answerLetters":"c","specificNote":"","groupNote":"(1)(2) Movimentare serve ancora (riducibile col layout); il controllo finale è sostituibile dalla qualità nel processo (eliminabile). (5) Nella cella l'operatore segue il pezzo su più macchine: polivalenza. (6) La manutenzione su guasto resta razionale per componenti non critici: diffida delle risposte con \"sempre\" e \"mai\"."},{"id":"c156","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.2","groupTitle":"Muda, kaizen, organizzazione","difficulty":"Medium","qnum":"5","question":"Un'organizzazione per flussi della produzione richiede da parte degli operatori un'elevata: (a) polivalenza; (b) esperienza; (c) specializzazione.","answerLetters":"a","specificNote":"Nella cella l'operatore segue il pezzo su più macchine: polivalenza.","groupNote":"(1)(2) Movimentare serve ancora (riducibile col layout); il controllo finale è sostituibile dalla qualità nel processo (eliminabile). (5) Nella cella l'operatore segue il pezzo su più macchine: polivalenza. (6) La manutenzione su guasto resta razionale per componenti non critici: diffida delle risposte con \"sempre\" e \"mai\"."},{"id":"c157","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.2","groupTitle":"Muda, kaizen, organizzazione","difficulty":"Medium","qnum":"6","question":"È importante che i processi produttivi abbiano bassi lead time allo scopo di: (a) entrambe: prevenire i problemi qualitativi e aumentare la flessibilità di risposta al mercato; (b) solo prevenire problemi qualitativi; (c) solo flessibilità. — E la manutenzione su guasto: (a) deve sempre essere evitata; (b) è l'unica applicazione in determinati contesti; (c) richiede un forte coinvolgimento degli operatori.","answerLetters":"a / b","specificNote":"La manutenzione su guasto resta razionale per componenti non critici: diffida delle risposte con \"sempre\" e \"mai\".","groupNote":"(1)(2) Movimentare serve ancora (riducibile col layout); il controllo finale è sostituibile dalla qualità nel processo (eliminabile). (5) Nella cella l'operatore segue il pezzo su più macchine: polivalenza. (6) La manutenzione su guasto resta razionale per componenti non critici: diffida delle risposte con \"sempre\" e \"mai\"."},{"id":"c158","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.3","groupTitle":"I tre calcoli","difficulty":"Hard","qnum":"1","question":"Il lotto economico, nel caso in cui si abbiano un costo di emissione unitario dell'ordine pari a 15, un fabbisogno totale pari a 2000 pezzi, un costo totale di mantenimento pari a 20000, una scorta media pari a 5000 pezzi, una scorta di sicurezza pari a 500 pezzi, è pari a: (a) 128; (b) 622; (c) 122.","answerLetters":"c","specificNote":"Costo di mantenimento unitario = 20.000/5.000 = 4. EOQ = √(2 × 2000 × 15 / 4) = √15.000 ≈ 122 . La scorta di sicurezza non entra nella formula (chi la somma ottiene 622).","groupNote":"(1) Costo di mantenimento unitario = 20.000/5.000 = 4. EOQ = √(2 × 2000 × 15 / 4) = √15.000 ≈ 122 . La scorta di sicurezza non entra nella formula (chi la somma ottiene 622).\n\n(2) Consumo massimo (100) × lead time in giorni lavorativi (10) / pezzi per contenitore (50) = 1000/50 = 20 . Usa il massimo, non la media (50 × 10 / 50 = 10 è il distrattore).\n\n(3) Lead time = 15 × 480 = 7200 minuti; tempo ciclo totale = 40 + 10 = 50 minuti (senza i setup); indice = 7200/50 = 144 . Procedimenti completi in §9.5."},{"id":"c159","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.3","groupTitle":"I tre calcoli","difficulty":"Hard","qnum":"2","question":"Supponendo che il consumo del particolare A sia al minimo 20 pezzi/giorno, mediamente 50 pezzi/giorno, al massimo 100 pezzi/giorno, che il lead time di riordino sia pari a due settimane lavorative e che il numero di pezzi per contenitore sia pari a 50, il numero di kanban necessari per garantire il rifornimento del particolare è pari a: (a) 4; (b) 20; (c) 10.","answerLetters":"b","specificNote":"Consumo massimo","groupNote":"(1) Costo di mantenimento unitario = 20.000/5.000 = 4. EOQ = √(2 × 2000 × 15 / 4) = √15.000 ≈ 122 . La scorta di sicurezza non entra nella formula (chi la somma ottiene 622).\n\n(2) Consumo massimo (100) × lead time in giorni lavorativi (10) / pezzi per contenitore (50) = 1000/50 = 20 . Usa il massimo, non la media (50 × 10 / 50 = 10 è il distrattore).\n\n(3) Lead time = 15 × 480 = 7200 minuti; tempo ciclo totale = 40 + 10 = 50 minuti (senza i setup); indice = 7200/50 = 144 . Procedimenti completi in §9.5."},{"id":"c160","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.3","groupTitle":"I tre calcoli","difficulty":"Hard","qnum":"3","question":"L'indice di flusso di un sistema produttivo avente lead time complessivo pari a 15 giorni lavorativi su turno normale, composto di due processi aventi tempo ciclo pari a 40 minuti e tempo di setup 1 ora il primo, tempo ciclo 10 minuti e tempo di setup 2 ore il secondo, è pari a: (a) 288; (b) 144; (c) 62.","answerLetters":"b","specificNote":"Lead time = 15 × 480 = 7200 minuti; tempo ciclo totale = 40 + 10 = 50 minuti (senza i setup); indice = 7200/50 = 144 . Procedimenti completi in §9.5.","groupNote":"(1) Costo di mantenimento unitario = 20.000/5.000 = 4. EOQ = √(2 × 2000 × 15 / 4) = √15.000 ≈ 122 . La scorta di sicurezza non entra nella formula (chi la somma ottiene 622).\n\n(2) Consumo massimo (100) × lead time in giorni lavorativi (10) / pezzi per contenitore (50) = 1000/50 = 20 . Usa il massimo, non la media (50 × 10 / 50 = 10 è il distrattore).\n\n(3) Lead time = 15 × 480 = 7200 minuti; tempo ciclo totale = 40 + 10 = 50 minuti (senza i setup); indice = 7200/50 = 144 . Procedimenti completi in §9.5."},{"id":"c161","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.4","groupTitle":"Scorte e just in sequence","difficulty":"Easy","qnum":"1","question":"Il livello di riordino è un metodo di gestione delle scorte: (a) a tempo fisso; (b) a fabbisogno; (c) a quantità fissa.","answerLetters":"c","specificNote":"Livello di riordino: quantità fissa, momento variabile.","groupNote":"(1) Livello di riordino: quantità fissa, momento variabile. (2) Niente tecnica unica: si differenzia per prodotto e processo. (3) Just in sequence = consegna nella sequenza esatta in cui il bisogno si manifesta sulla linea."},{"id":"c162","chapter":"VIII","chapterTitle":"Lean production","groupCode":"E9.4","groupTitle":"Scorte e just in sequence","difficulty":"Easy","qnum":"2","question":"Nella gestione delle scorte è opportuno: (a) scegliere una tecnica di gestione uniforme per tutti i flussi produttivo-logistici aziendali; (b) adottare strumenti software dedicati; (c) differenziare le tecniche adottate in funzione delle caratteristiche dei prodotti e dei processi.","answerLetters":"c","specificNote":"Niente tecnica unica: si differenzia per prodotto e processo.","groupNote":"(1) Livello di riordino: quantità fissa, momento variabile. (2) Niente tecnica unica: si differenzia per prodotto e processo. (3) Just in sequence = consegna nella sequenza esatta in cui il bisogno si manifesta sulla linea."},{"id":"c163","chapte ersione hai davanti dalle opzioni offerte. (4) Dipendenza strutturale → collaborazione di lungo periodo, non guerra negoziale. (6) L'ICT cambia il processo, non le clausole giuridiche."},{"id":"c177","chapter":"IX","chapterTitle":"Approvvigionamenti","groupCode":"E10.3","groupTitle":"Partnership, esternalizzazione, ICT","difficulty":"Hard","qnum":"4","question":"Per le imprese che hanno fatto un ricorso sistematico e strutturale ai fornitori, è essenziale: (a) aumentare il proprio potere contrattuale utilizzabile in sede di negoziazione; (b) attivare meccanismi di ricerca di mercato continui, volti anche a una sostituzione delle fonti; (c) realizzare forme di collaborazione nel lungo periodo, che consentano processi di miglioramento continuo.","answerLetters":"c","specificNote":"Dipendenza strutturale → collaborazione di lungo periodo, non guerra negoziale.","groupNote":"(2) ATTENZIONE: questa è la versione della banca domande, che marca \"competenze distintive della supply chain\". Il quiz (domanda 26) marca invece \"minimizzazione dei costi transazionali\" per la stessa domanda. Contraddizione segnalata in §10.3: riconosci quale versione hai davanti dalle opzioni offerte. (4) Dipendenza strutturale → collaborazione di lungo periodo, non guerra negoziale. (6) L'ICT cambia il processo, non le clausole giuridiche."},{"id":"c178","chapter":"IX","chapterTitle":"Approvvigionamenti","groupCode":"E10.3","groupTitle":"Partnership, esternalizzazione, ICT","difficulty":"Hard","qnum":"5","question":"Tra i drivers che hanno spinto le imprese a internazionalizzare i processi di approvvigionamento: (a) la crescita del livello culturale degli operatori; (b) la maggior pressione competitiva, che ha costretto a ridurre i costi; (c) la stabilità dei cambi tra le monete. — E tra i rischi tipici dell'internazionalizzazione degli acquisti: (a) le diversità tra i sistemi di misura; (b) le difficoltà di comunicazione dovute alle distanze; (c) i maggiori problemi nella definizione delle specifiche contrattuali.","answerLetters":"b / c","specificNote":"","groupNote":"(2) ATTENZIONE: questa è la versione della banca domande, che marca \"competenze distintive della supply chain\". Il quiz (domanda 26) marca invece \"minimizzazione dei costi transazionali\" per la stessa domanda. Contraddizione segnalata in §10.3: riconosci quale versione hai davanti dalle opzioni offerte. (4) Dipendenza strutturale → collaborazione di lungo periodo, non guerra negoziale. (6) L'ICT cambia il processo, non le clausole giuridiche."},{"id":"c179","chapter":"IX","chapterTitle":"Approvvigionamenti","groupCode":"E10.3","groupTitle":"Partnership, esternalizzazione, ICT","difficulty":"Hard","qnum":"6","question":"L'evoluzione delle applicazioni delle tecnologie ICT non ha avuto alcun effetto rilevante: (a) sull'efficacia del processo di approvvigionamento; (b) sulle clausole negoziate tra le imprese e inserite nei contratti d'acquisto; (c) sull'efficienza del processo di approvvigionamento. — E tra le attività solitamente inserite nell'e-procurement non figurano quelle di: (a) supporto alla gestione integrata del ciclo ordine-consegna-fatturazione; (b) negoziazione; (c) acquisti da catalogo elettronico.","answerLetters":"b / a","specificNote":"L'ICT cambia il processo, non le clausole giuridiche.","groupNote":"(2) ATTENZIONE: questa è la versione della banca domande, che marca \"competenze distintive della supply chain\". Il quiz (domanda 26) marca invece \"minimizzazione dei costi transazionali\" per la stessa domanda. Contraddizione segnalata in §10.3: riconosci quale versione hai davanti dalle opzioni offerte. (4) Dipendenza strutturale → collaborazione di lungo periodo, non guerra negoziale. (6) L'ICT cambia il processo, non le clausole giuridiche."}]},{"roman":"X","title":"Finanza aziendale","sectionHeading":"11.6 Esercizi (Capitolo X)","groups":[{"code":"E11.1","title":"Rendite perpetue e attualizzazione","difficulty":"Hard","declaredCount":"3","actualCount":3},{"code":"E11.2","title":"VAN, costi sommersi, TIR, CAPM","difficulty":"Medium","declaredCount":"3","actualCount":3},{"code":"E11.3","title":"Struttura finanziaria","difficulty":"Hard","declaredCount":"4","actualCount":4},{"code":"E11.4","title":"Governance e gruppi piramidali","difficulty":"Hard","declaredCount":"4","actualCount":4}],"cards":[{"id":"c180","chapter":"X","chapterTitle":"Finanza aziendale","groupCode":"E11.1","groupTitle":"Rendite perpetue e attualizzazione","difficulty":"Hard","qnum":"1","question":"Qual è il valore di una rendita perpetua in crescita costante con un flusso di cassa iniziale pari a 5, un tasso di crescita costante (g) pari al 7.5% e un tasso di attualizzazione pari al 10%? (a) 200; (b) 66.665; (c) 50.","answerLetters":"a","specificNote":"V = 5/(0,10−0,075) = 5/0,025 = 200.","groupNote":"(1) V = 5/(0,10−0,075) = 5/0,025 = 200. (2) La formula valuta la rendita all'anno 5 (un anno prima del primo flusso): V₀ = 200/(1,10)⁵ = 124,18. Scontare per 6 anni dà il distrattore 112,89. (3) Nominale con nominale, reale con reale — mai mescolare."},{"id":"c181","chapter":"X","chapterTitle":"Finanza aziendale","groupCode":"E11.1","groupTitle":"Rendite perpetue e attualizzazione","difficulty":"Hard","qnum":"2","question":"Qual è il valore attuale della rendita della precedente domanda se il primo flusso di cassa viene percepito nell'anno 6? (a) 124.18; (b) 200; (c) 112.89.","answerLetters":"a","specificNote":"La formula valuta la rendita all'anno 5 (un anno prima del primo flusso): V₀ = 200/(1,10)⁵ = 124,18. Scontare per 6 anni dà il distrattore 112,89.","groupNote":"(1) V = 5/(0,10−0,075) = 5/0,025 = 200. (2) La formula valuta la rendita all'anno 5 (un anno prima del primo flusso): V₀ = 200/(1,10)⁵ = 124,18. Scontare per 6 anni dà il distrattore 112,89. (3) Nominale con nominale, reale con reale — mai mescolare."},{"id":"c182","chapter":"X","chapterTitle":"Finanza aziendale","groupCode":"E11.1","groupTitle":"Rendite perpetue e attualizzazione","difficulty":"Hard","qnum":"3","question":"Il principio di coerenza nelle valutazioni delle decisioni di investimento richiede che, in presenza di inflazione: (a) i flussi di cassa nominali siano scontati a un tasso di rendimento reale; (b) i flussi di cassa nominali siano scontati a un tasso di rendimento nominale; (c) i flussi di cassa reali siano scontati a un tasso di rendimento nominale.","answerLetters":"b","specificNote":"Nominale con nominale, reale con reale — mai mescolare.","groupNote":"(1) V = 5/(0,10−0,075) = 5/0,025 = 200. (2) La formula valuta la rendita all'anno 5 (un anno prima del primo flusso): V₀ = 200/(1,10)⁵ = 124,18. Scontare per 6 anni dà il distrattore 112,89. (3) Nominale con nominale, reale con reale — mai mescolare."},{"id":"c183","chapter":"X","chapterTitle":"Finanza aziendale","groupCode":"E11.2","groupTitle":"VAN, costi sommersi, TIR, CAPM","difficulty":"Medium","qnum":"1","question":"La gamma company sta valutando una nuova linea-prodotto. La società ha già pagato, lo scorso anno, 100.000 a un'impresa esterna di consulenza come compenso di un'indagine di mercato. Tale somma: (a) in quanto costo sommerso, non deve essere computata nel calcolare il VAN del progetto; (b) deve essere computata ai fini del VAN, capitalizzata a oggi al costo opportunità del capitale aziendale; (c) in quanto primo flusso di cassa (negativo), deve essere computata nel calcolare il VAN del progetto.","answerLetters":"a","specificNote":"Il costo è già sostenuto: non è incrementale, non entra nel VAN.","groupNote":"(1) Il costo è già sostenuto: non è incrementale, non entra nel VAN. (2) Ogni cambio di segno nei flussi può generare una radice in più dell'equazione del TIR. (3) Premio = 13% − 3,8% = 9,2%."},{"id":"c184","chapter":"X","chapterTitle":"Finanza aziendale","groupCode":"E11.2","groupTitle":"VAN, costi sommersi, TIR, CAPM","difficulty":"Medium","qnum":"2","question":"Un progetto può avere più di un TIR se: (a) si registra più di un cambiamento di segno nei suoi flussi di cassa; (b) il VAN dello stesso è positivo; (c) il VAN dello stesso è pari a zero.","answerLetters":"a","specificNote":"Ogni cambio di segno nei flussi può generare una radice in più dell'equazione del TIR.","groupNote":"(1) Il costo è già sostenuto: non è incrementale, non entra nel VAN. (2) Ogni cambio di segno nei flussi può generare una radice in più dell'equazione del TIR. (3) Premio = 13% − 3,8% = 9,2%."},{"id":"c185","chapter":"X","chapterTitle":"Finanza aziendale","groupCode":"E11.2","groupTitle":"VAN, costi sommersi, TIR, CAPM","difficulty":"Medium","qnum":"3","question":"Se il rendimento annuo dell'indice di mercato è 13% e il rendimento medio dei titoli di stato è pari a 3.8%, qual è il premio atteso per il rischio di mercato in base al CAPM? (a) 13%; (b) 9.2%; (c) 3.8%.","answerLetters":"b","specificNote":"Premio = 13% − 3,8% = 9,2%.","groupNote":"(1) Il costo è già sostenuto: non è incrementale, non entra nel VAN. (2) Ogni cambio di segno nei flussi può generare una radice in più dell'equazione del TIR. (3) Premio = 13% − 3,8% = 9,2%."},{"id":"c186","chapter":"X","chapterTitle":"Finanza aziendale","groupCode":"E11.3","groupTitle":"Struttura finanziaria","difficulty":"Hard","qnum":"1","question":"In un mondo perfetto senza costi di transazione, di fallimento e senza imposte quale sarebbe la struttura finanziaria ottimale? (a) Qualsiasi struttura finanziaria; (b) una struttura composta per metà da debito e metà da capitale netto; (c) una struttura di solo capitale netto.","answerLetters":"a","specificNote":"","groupNote":"(1)(2) Modigliani-Miller: nel mondo perfetto la struttura è irrilevante, e l'attivo non cambia rendimento per come è finanziato. (3) Attività tangibili = garanzie solide = capacità di debito alta. (4) Risparmio = privilegio patrimoniale in cambio del voto; dividendi MAI deducibili (gli interessi sì)."},{"id":"c187","chapter":"X","chapterTitle":"Finanza aziendale","groupCode":"E11.3","groupTitle":"Struttura finanziaria","difficulty":"Hard","qnum":"2","question":"Se una società modifica la propria struttura finanziaria: (a) il rendimento atteso dell'equity non varia; (b) il rendimento atteso delle attività non varia; (c) il rendimento atteso del debito non varia.","answerLetters":"b","specificNote":"Modigliani-Miller: nel mondo perfetto la struttura è irrilevante, e l'attivo non cambia rendimento per come è finanziato.","groupNote":"(1)(2) Modigliani-Miller: nel mondo perfetto la struttura è irrilevante, e l'attivo non cambia rendimento per come è finanziato. (3) Attività tangibili = garanzie solide = capacità di debito alta. (4) Risparmio = privilegio patrimoniale in cambio del voto; dividendi MAI deducibili (gli interessi sì)."},{"id":"c188","chapter":"X","chapterTitle":"Finanza aziendale","groupCode":"E11.3","groupTitle":"Struttura finanziaria","difficulty":"Hard","qnum":"3","question":"Secondo la teoria del trade-off della struttura finanziaria, dovrebbero indebitarsi di più le imprese: (a) con elevate attività tangibili; (b) con elevati valori di avviamento; (c) con scarso reddito imponibile.","answerLetters":"a","specificNote":"Attività tangibili = garanzie solide = capacità di debito alta.","groupNote":"(1)(2) Modigliani-Miller: nel mondo perfetto la struttura è irrilevante, e l'attivo non cambia rendimento per come è finanziato. (3) Attività tangibili = garanzie solide = capacità di debito alta. (4) Risparmio = privilegio patrimoniale in cambio del voto; dividendi MAI deducibili (gli interessi sì)."},{"id":"c189","chapter":"X","chapterTitle":"Finanza aziendale","groupCode":"E11.3","groupTitle":"Struttura finanziaria","difficulty":"Hard","qnum":"4","question":"Quale delle seguenti affermazioni caratterizza le azioni di risparmio? (a) un'impresa che non paga dividendi agli azionisti di risparmio è considerata insolvente; (b) i dividendi sono deducibili dalle imposte, a differenza di quelli delle azioni ordinarie; (c) Gli azionisti di risparmio non hanno diritti di voto.","answerLetters":"c"," "question":"Secondo il paradigma tayloristico, quale fattore rende i lavoratori dei soggetti contrattualmente \"deboli\"? (a) il loro basso livello di istruzione; (b) La loro elevata sostituibilità; (c) la loro alienazione dal resto delle strutture aziendali.","answerLetters":"b","specificNote":"Compito elementare = chiunque può farlo = zero potere contrattuale.","groupNote":"(3) Taylor predica la collaborazione tra dirigenti e operai (separa la progettazione dall'esecuzione, non le persone). (4) Massa = volumi, non varietà. (5) Compito elementare = chiunque può farlo = zero potere contrattuale."},{"id":"c199","chapter":"XI","chapterTitle":"Organizzazione e risorse umane","groupCode":"E12.2","groupTitle":"Le scuole organizzative","difficulty":"Medium","qnum":"1","question":"Secondo gli studi condotti dalla Scuola delle Relazioni Umane (Human Relations), avviata da Elton Mayo, la presenza di un osservatore: (a) migliora le performance produttive dei lavoratori; (b) peggiora le performance; (c) non ha influenza.","answerLetters":"a","specificNote":"È l'effetto Hawthorne: essere osservati cambia il comportamento — la scoperta che fondò la scuola. La tabella di §12.2 mappa tutte e cinque le correnti sulle rispettive idee.","groupNote":"(1) È l'effetto Hawthorne: essere osservati cambia il comportamento — la scoperta che fondò la scuola. La tabella di §12.2 mappa tutte e cinque le correnti sulle rispettive idee."},{"id":"c200","chapter":"XI","chapterTitle":"Organizzazione e risorse umane","groupCode":"E12.2","groupTitle":"Le scuole organizzative","difficulty":"Medium","qnum":"2","question":"Quale delle seguenti correnti di studi si occupò delle variabili individuali e sociali dell'organizzazione? (a) Scuola delle Relazioni Umane; (b) Taylorismo; (c) Contingentismo.","answerLetters":"a","specificNote":"","groupNote":"(1) È l'effetto Hawthorne: essere osservati cambia il comportamento — la scoperta che fondò la scuola. La tabella di §12.2 mappa tutte e cinque le correnti s ","specificNote":"Le persone entrano per i PROPRI scopi: l'organizzazione efficace li allinea ai suoi.","groupNote":"(1) Il sorgente marca \"sufficiente e ottimale\"; la formulazione di Simon da manuale è \"soddisfacente\" (satisficing) — vedi §12.2. (3) Le persone entrano per i PROPRI scopi: l'organizzazione efficace li allinea ai suoi."},{"id":"c207","chapter":"XI","chapterTitle":"Organizzazione e risorse umane","groupCode":"E12.4","groupTitle":"Gruppi, identità, commitment","difficulty":"Hard","qnum":"1","question":"Gli psicologi sostengono che il processo mediante il quale un individuo entra a far parte di un gruppo si compone di tre fasi: (a) 1. osservazione iniziale del gruppo; 2. cambiamenti nel concetto di sé; 3. l'iniziazione; (b) 1. osservazione iniziale; 2. valutazione delle alternative; 3. la scelta; (c) 1. valutazione delle alternative; 2. cambiamenti nel concetto di sé; 3. iniziazione.","answerLetters":"a","specificNote":"","groupNote":"(3) I fattori della teoria sono TRE (valenza × aspettativa × strumentalità): ogni coppia proposta è incompleta, quindi \"nessuna delle altre\". (5) L'identificazione alta rafforza il commitment (non lo diminuisce) e produce sia cooperazione interna sia discriminazione esterna."},{"id":"c208","chapter":"XI","chapterTitle":"Organizzazione e risorse umane","groupCode":"E12.4","groupTitle":"Gruppi, identità, commitment","difficulty":"Hard","qnum":"2","question":"Il desiderio di restare con l'organizzazione non si forma sulla base: (a) della coerenza professionale con le precedenti esperienze; (b) della compatibilità della mansione con altri ruoli; (c) della prevedibilità dei rapporti legati alla mansione.","answerLetters":"a","specificNote":"","groupNote":"(3) I fattori della teoria sono TRE (valenza × aspettativa × strumentalità): ogni coppia proposta è incompleta, quindi \"nessuna delle altre\". (5) L'identificazione alta rafforza il commitment (non lo diminuisce) e produce sia cooperazione interna sia discriminazione est   function escapeHtml(s) {

  function getQuickSelectLetters(card) {
    if (!card || !card.question) return [];
    if (card.question.indexOf(' — ') !== -1) return []; // compound double-question, skip

    const re = /\(([a-e])\)/g;

    let m;

  function withTransition(fn) {

  function animateNumber(el, to, opts) {
    if (!el) return;
    opts = opts || {};
    const duration = opts.duration || 550;
    const suffix = opts.suffix || '';
    const start = performance.now();
    function tick(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const val = Math.round(to * eased);
      el.textContent = val + suffix;
      if (t < 1) requestAnimationFrame(tick);
      else el.textContent = to + suffix;
    }
    requestAnimationFrame(tick);
  }

  }
  function setProg(id, patch) {
    const cur = getProg(id);
    progress[id] = Object.assign({}, cur, patch);
    saveProgress();
  }

  /* ============================================================
     STATE
     ============================================================ */
  let state = {
    view: 'dashboard',
    scope: null,       // {type:'chapter', roman} | {type:'shuffle'}
    filter: 'all',
    baseOrder: [],
    activeIndex: 0,
    flipped: false,
    selectedOption: null,
  };
  let lastCardId = null;

  /* ============================================================
     DERIVED
     ============================================================ */
  function chapterStats(roman) {
    const ch = CHAPTER_BY_ROMAN[roman];
    let correct = 0, wrong = 0, seen = 0, favorites = 0;
    ch.cards.forEach(function (c) {
      const p = getProg(c.id);
      if (p.status === 'correct') correct++;
      if (p.status === 'wrong') wrong++;
      if (p.status) seen++;
      if (p.favorite) favorites++;
    });
    return {
      total: ch.cards.length, correct: correct, wrong: wrong, seen: seen, favorites: favorites,
      pct: ch.cards.length ? Math.round((correct / ch.cards.length) * 100) : 0
    };
  }

  function overallStats() {
    let correct = 0, wrong = 0, seen = 0, favorites = 0;
    ALL_CARDS.forEach(function (c) {
      const p = getProg(c.id);
      if (p.status === 'correct') correct++;
      if (p.status === 'wrong') wrong++;
      if (p.status) seen++;
      if (p.favorite) favorites++;
    });
    const answered = correct + wrong;
    return {
      total: TOTAL_CARDS, correct: correct, wrong: wrong, seen: seen, favorites: favorites,
      overallPct: TOTAL_CARDS ? Math.round((correct / TOTAL_CARDS) * 100) : 0,
      accuracy: answered ? Math.round((correct / answered) * 100) : null,
      chaptersCompleted: CHAPTERS.filter(function (ch) { return chapterStats(ch.roman).pct === 100; }).length
    };
  }

  function applyFilter(ids, filter) {
    if (filter === 'all') return ids;
    return ids.filter(function (id) {
      const p = getProg(id);
      if (filter === 'review') return p.status !== 'correct';
      if (filter === 'errors') return p.status === 'wrong';
      if (filter === 'favorites') return !!p.favorite;
      if (filter === 'completed') return p.status === 'correct';
      return true;
    });
  }

  function getActiveIds() {
    return applyFilter(state.baseOrder, state.filter);
  }

  function shuffleArr(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  const ROMAN_TITLE_CACHE = null;

  /* ============================================================
     NAVIGATION
     ============================================================ */
  function openChapter(roman) {
    const ch = CHAPTER_BY_ROMAN[roman];
    if (!ch) return;
    withTransition(function () {
      state.scope = { type: 'chapter', roman: roman };
      state.filter = 'all';
      const ids = ch.cards.map(function (c) { return c.id; });
      state.baseOrder = ids;
      let idx = ids.findIndex(function (id) { return getProg(id).status !== 'correct'; });
      state.activeIndex = idx === -1 ? 0 : idx;
      state.flipped = false;
      state.view = 'study';
      lastCardId = null;
      render();
    });
  }

  function openShuffle() {
    withTransition(function () {
      state.scope = { type: 'shuffle' };
      state.filter = 'all';
      state.baseOrder = shuffleArr(ALL_CARDS.map(function (c) { return c.id; }));
      state.activeIndex = 0;
      state.flipped = false;
      state.view = 'study';
      lastCardId = null;
      render();
    });
  }

  function reshuffleCurrent() {
    if (!state.scope || state.scope.type !== 'shuffle') return;
    withTransition(function () {
      state.baseOrder = shuffleArr(ALL_CARDS.map(function (c) { return c.id; }));
      state.activeIndex = 0;
      state.flipped = false;
      lastCardId = null;
      render();
    });
    showToast('Mazzo rimescolato');
  }

  function openCardDirect(cardId) {
    const card = CARD_BY_ID[cardId];
    if (!card) return;
    withTransition(function () {
      const ch = CHAPTER_BY_ROMAN[card.chapter];
      state.scope = { type: 'chapter', roman: card.chapter };
      state.filter = 'all';
      const ids = ch.cards.map(function (c) { return c.id; });
      state.baseOrder = ids;
      state.activeIndex = ids.indexOf(cardId);
      state.flipped = false;
      state.view = 'study';
      lastCardId = null;
      render();
    });
  }

  function goDashboard() {
    withTransition(function () {
      state.view = 'dashboard';
      render();
    });
  }

  function setFilter(f) {
    if (state.filter === f) return;
    const currentId = getActiveIds()[state.activeIndex];
    state.filter = f;
    const ids = getActiveIds();
    let idx = currentId ? ids.indexOf(currentId) : -1;
    state.activeIndex = idx !== -1 ? idx : 0;
    state.flipped = false;
    render();
  }

  function goPrevManual() {
    state.activeIndex = Math.max(0, state.activeIndex - 1);
    state.flipped = false;
    renderCardOnly('prev');
  }
  function goNextManual() {
    const ids = getActiveIds();
    state.activeIndex = Math.min(Math.max(ids.length - 1, 0), state.activeIndex + 1);
    state.flipped = false;
    renderCardOnly('next');
  }

  function advanceAfterUpdate(preferredNextId) {
    const ids = getActiveIds();
    if (ids.length === 0) { state.activeIndex = 0; state.flipped = false; render(); return; }
    let idx = preferredNextId ? ids.indexOf(preferredNextId) : -1;
    if (idx === -1) idx = Math.min(state.activeIndex, ids.length - 1);
    state.activeIndex = idx;
    state.flipped = false;
    renderCardOnly('next');
  }

  function renderCardOnly(direction) {
    const ids = getActiveIds();
    if (ids.length === 0) { render(); return; }
    renderCardContent(direction);
    updateChrome();
  }

  const celebratedChapters = new Set();
  function checkChapterCompletion(cardId) {
    const card = CARD_BY_ID[cardId];
    if (!card) return;
    const s = chapterStats(card.chapter);
    if (s.pct === 100 && !celebratedChapters.has(card.chapter)) {
      celebratedChapters.add(card.chapter);
      burstConfetti();
      setTimeout(function () { showToast('Capitolo ' + card.chapter + ' completato! \uD83C\uDF89'); }, 120);
    }
  }

  function gradeCurrent(status) {
    const idsBefore = getActiveIds();
    const currentId = idsBefore[state.activeIndex];
    if (!currentId) return;

    const cb = document.getElementById('gradeCorrectBtn');
    const wb = document.getElementById('gradeWrongBtn');
    if ((cb && cb.disabled) || (wb && wb.disabled)) return; // already processing this grade, ignore repeat clicks
    if (cb) cb.disabled = true;
    if (wb) wb.disabled = true;

    const nextIdBefore = idsBefore[state.activeIndex + 1];
    setProg(currentId, { status: status });

    const btn = document.getElementById(status === 'correct' ? 'gradeCorrectBtn' : 'gradeWrongBtn');
    if (btn) { btn.classList.remove('pulse'); void btn.offsetWidth; btn.classList.add('pulse'); }
    document.querySelectorAll('.card-face').forEach(function (f) {
      f.classList.remove('flash-good', 'flash-bad');
      void f.offsetWidth;
      f.classList.add(status === 'correct' ? 'flash-good' : 'flash-bad');
    });

    showToast(status === 'correct' ? 'Segnata come corretta \u2713' : 'Segnata come sbagliata \u2014 la rivedrai');

    updateGradeActiveState();
    updateChrome();
    if (status === 'correct') checkChapterCompletion(currentId);

    setTimeout(function () { advanceAfterUpdate(nextIdBefore); }, 240);
  }

  function toggleFavoriteCurrent() {
    const ids = getActiveIds();
    const id = ids[state.activeIndex];
    if (!id) return;
    const p = getProg(id);
    const newFav = !p.favorite;
    setProg(id, { favorite: newFav });

    if (newFav) {
      ['starBtnFront', 'starBtnBack', 'gradeFavBtn'].forEach(function (elId) {
        const el = document.getElementById(elId);
        if (el) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
      });
    }

    if (state.filter === 'favorites' && !newFav) {
      advanceAfterUpdate(ids[state.activeIndex + 1]);
    } else {
      updateGradeActiveState();
      updateChrome();
    }
  }

  function syncCardHeight() {
    const el = document.getElementById('flashcard');
    if (!el) return;
    const activeFace = el.querySelector(state.flipped ? '.card-back' : '.card-front');
    if (!activeFace) return;
    const target = Math.max(activeFace.scrollHeight, 340);
    el.style.height = target + 'px';
  }

  function toggleFlip() {
    const el = document.getElementById('flashcard');
    if (!el) return;
    state.flipped = !state.flipped;
    el.classList.toggle('flipped', state.flipped);
    syncCardHeight();

    const flipIcon = document.getElementById('flipBtnIcon');
    if (flipIcon) flipIcon.classList.toggle('spun', state.flipped);
    updateGradeEnabledState();
  }

  function toggleGroupNote() {
    const body = document.getElementById('groupNoteBody');
    const chev = document.getElementById('groupNoteChevron');
    if (!body) return;
    const open = body.style.display !== 'block';
    body.style.display = open ? 'block' : 'none';
    if (chev) chev.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
    syncCardHeight();
  }

  /* ============================================================
     TOAST
     ============================================================ */
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove('show'); }, 1800);
  }

  /* ============================================================
     RENDER: SIDEBAR
     ============================================================ */
  function renderSidebar() {
    const nav = document.querySelectorAll('.nav-item');
    nav.forEach(function (n) {
      const which = n.getAttribute('data-nav');
      const active = (which === 'dashboard' && state.view === 'dashboard') ||
                     (which === 'shuffle' && state.view === 'study' && state.scope && state.scope.type === 'shuffle');
      n.classList.toggle('active', active);
    });

    const list = document.getElementById('chapterList');
    list.innerHTML = CHAPTERS.map(function (ch) {
      const s = chapterStats(ch.roman);
      const active = state.view === 'study' && state.scope && state.scope.type === 'chapter' && state.scope.roman === ch.roman;
      return '' +
        '<button class="chapter-item' + (active ? ' active' : '') + '" data-open-chapter="' + ch.roman + '">' +
          '<div class="chapter-item-top">' +
            '<span class="chapter-roman">' + ch.roman + '</span>' +
            '<span class="chapter-name">' + escapeHtml(ch.title) + '</span>' +
            '<span class="chapter-count" id="chapterCount-' + ch.roman + '">' + s.correct + '/' + s.total + '</span>' +
          '</div>' +
          '<div class="chapter-progress-track"><div class="chapter-progress-fill" id="chapterFill-' + ch.roman + '" style="width:' + s.pct + '%"></div></div>' +
        '</button>';
    }).join('');
  }

  /* ============================================================
     RENDER: DASHBOARD
     ============================================================ */
  function renderDashboard() {
    const st = overallStats();
    const main = document.getElementById('main');

    main.innerHTML = '' +

          '<div class="dash-eyebrow">STUDIO \u00b7 ECONOMIA E GESTIONE D\'IMPRESA</div>' +

          '</div>' +
          '<div class="stat-card">' +
            '<div class="stat-icon">' + icon('target', 16) + '</div>' +
            '<div class="stat-value" id="statPct">0%</div>' +
            '<div class="stat-label">Progresso complessivo</div>' +
          '</div>' +
          '<div class="stat-card">' +
            '<div class="stat-icon">' + icon('trophy', 16) + '</div>' +

                '<div class="mini-stat-row"><span class="mini-stat-label">' + icon('x', 14) + ' Da rivedere</span><span class="mini-stat-value danger">' + st.wrong + '</span></div>' +
                '<div class="mini-stat-row"><span class="mini-stat-label">' + icon('star', 14) + ' Preferite</span><span class="mini-stat-value favorite">' + st.favorites + '</span></div>' +
                '<div class="mini-stat-row"><span class="mini-stat-label">Card viste</span><span class="mini-stat-value">' + st.seen + '/' + st.total + '</span></div>' +

    if (resumeBtn && resumeChapter) resumeBtn.addEventListener('click', function () { openChapter(resumeChapter.roman); });

  /* ============================================================
     RENDER: STUDY VIEW
     ============================================================ */
  const FILTERS = [
    { key: 'all', label: 'Tutte' },
    { key: 'review', label: 'Da ripassare' },
    { key: 'errors', label: 'Errori' },
    { key: 'favorites', label: 'Preferiti' },
    { key: 'completed', label: 'Completate' }
  ];

  function scopeTitle() {
    if (!state.scope) return '';
    if (state.scope.type === 'shuffle') return 'Shuffle \u2014 tutte le domande';
    const ch = CHAPTER_BY_ROMAN[state.scope.roman];
    return 'Capitolo ' + ch.roman + ' \u2014 ' + ch.title;
  }
  function scopeEyebrow() {
    if (!state.scope) return '';
    return state.scope.type === 'shuffle' ? 'MODALIT\u00c0 SHUFFLE' : 'CAPITOLO ' + state.scope.roman;
  }

  function difficultyPillClass(diff) {
    const d = (diff || '').toLowerCase();
    if (d === 'easy') return 'pill-diff-easy';
    if (d === 'medium') return 'pill-diff-medium';
    if (d === 'hard') return 'pill-diff-hard';
    return 'pill-chapter';
  }

  function renderStudyView() {
    const main = document.getElementById('main');
    const scopeIdsAll = state.baseOrder;
    const filterCounts = {};
    FILTERS.forEach(function (f) { filterCounts[f.key] = applyFilter(scopeIdsAll, f.key).length; });
    const activeIds = getActiveIds();

    const chips = FILTERS.map(function (f) {
      return '<button class="chip' + (state.filter === f.key ? ' active' : '') + '" data-filter="' + f.key + '">' +
        f.label + ' <span class="chip-count">' + filterCounts[f.key] + '</span></button>';
    }).join('');

    let cardAreaHtml;
    if (activeIds.length === 0) {
      cardAreaHtml = '' +
        '<div class="empty-state">' +
          icon('inbox', 40) +
          '<div class="empty-state-title">Nessuna card in questo filtro</div>' +
          '<div class="empty-state-sub">Prova a cambiare filtro, oppure torna a "Tutte" per continuare lo studio.</div>' +
          '<button class="btn-primary" id="emptyStateResetBtn">Torna a "Tutte"</button>' +
        '</div>';
    } else {
      cardAreaHtml = '<div class="card-stage"><div class="flashcard" id="flashcard"></div></div>' +
        '<div class="controls-row">' +
          '<button class="ctrl-btn icon-only" id="prevBtn" title="Precedente (\u2190)">' + icon('chevronLeft', 16) + '</button>' +
          '<button class="ctrl-btn primary" id="flipBtn"><span id="flipBtnIcon" class="flip-icon">' + icon('sparkle', 15) + '</span> <span id="flipBtnLabel">Mostra risposta</span></button>' +
          '<button class="ctrl-btn icon-only" id="nextBtn" title="Successiva (\u2192)">' + icon('chevronRight', 16) + '</button>' +
        '</div>' +
        '<div class="grade-row">' +
          '<button class="grade-btn correct" id="gradeCorrectBtn">' + icon('check', 14) + ' Corretta</button>' +
          '<button class="grade-btn wrong" id="gradeWrongBtn">' + icon('x', 14) + ' Sbagliata</button>' +
          '<button class="grade-btn fav" id="gradeFavBtn">' + icon('star', 14) + ' Preferita</button>' +
        '</div>' +
        '<div class="keyboard-hints">' +
          '<span><span class="kbd">Spazio</span> mostra/nascondi</span>' +
          '<span><span class="kbd">\u2190</span><span class="kbd">\u2192</span> naviga</span>' +
          '<span><span class="kbd">1</span> corretta</span>' +
          '<span><span class="kbd">2</span> sbagliata</span>' +
          '<span><span class="kbd">F</span> preferita</span>' +
        '</div>';
    }

    main.innerHTML = '' +
      '<div class="view narrow view-enter">' +
        '<div class="topbar">' +
          '<button class="btn-back" id="backBtn">' + icon('arrowBack', 14) + ' Indietro</button>' +
          '<div class="topbar-titles">' +
            '<div class="topbar-eyebrow">' + scopeEyebrow() + '</div>' +
            '<div class="topbar-title">' + escapeHtml(scopeTitle()) + '</div>' +
          '</div>' +
          (state.scope && state.scope.type === 'shuffle' ?
            '<button class="btn-back" id="reshuffleBtn" title="Rimescola">' + icon('shuffle', 14) + '</button>' : '') +
          '<div class="topbar-progress" id="topbarProgress"></div>' +
        '</div>' +
        '<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>' +
        '<div class="chip-row" id="chipRow">' + chips + '</div>' +
        cardAreaHtml +
      '</div>';

    document.getElementById('backBtn').addEventListener('click', goDashboard);
    const reshuffleBtn = document.getElementById('reshuffleBtn');
    if (reshuffleBtn) reshuffleBtn.addEventListener('click', reshuffleCurrent);

    main.querySelectorAll('[data-filter]').forEach(function (chip) {
      chip.addEventListener('click', function () { setFilter(chip.getAttribute('data-filter')); });
    });
    const emptyResetBtn = document.getElementById('emptyStateResetBtn');
    if (emptyResetBtn) emptyResetBtn.addEventListener('click', function () { setFilter('all'); });

    if (activeIds.length > 0) {
      document.getElementById('prevBtn').addEventListener('click', goPrevManual);
      document.getElementById('nextBtn').addEventListener('click', goNextManual);
      document.getElementById('flipBtn').addEventListener('click', toggleFlip);
      document.getElementById('gradeCorrectBtn').addEventListener('click', function () { gradeCurrent('correct'); });
      document.getElementById('gradeWrongBtn').addEventListener('click', function () { gradeCurrent('wrong'); });
      document.getElementById('gradeFavBtn').addEventListener('click', toggleFavoriteCurrent);

      renderCardContent();
    }

    updateChrome();
    renderSidebar();
  }

  function renderCardContent(direction) {
    const ids = getActiveIds();
    if (state.activeIndex >= ids.length) state.activeIndex = Math.max(0, ids.length - 1);
    const id = ids[state.activeIndex];
    const card = CARD_BY_ID[id];
    const el = document.getElementById('flashcard');
    if (!card || !el) return;

    const prog = getProg(id);
    const isNewCard = (id !== lastCardId);
    if (isNewCard) {
      state.flipped = false;
      state.selectedOption = null;
    }

    const diffClass = difficultyPillClass(card.difficulty);
    const hasAnswer = !!card.answerLetters;
    const groupNoteTrim = (card.groupNote || '').trim();
    const specificTrim = (card.specificNote || '').trim();
    const hasSpecific = !!specificTrim;
    const hasGroup = !!groupNoteTrim && groupNoteTrim !== specificTrim;

    let noteHtml = '';
    let toggleHtml = '';
    if (hasSpecific) {
      noteHtml = '<div class="answer-note">' + escapeHtml(card.specificNote) + '</div>';
      if (hasGroup) {
        toggleHtml = '' +
          '<button class="group-note-toggle" id="groupNoteToggleBtn">' + icon('chevronDown', 12, 'id="groupNoteChevron" style="transition:transform .2s"') + ' Note complete del gruppo ' + escapeHtml(card.groupCode) + '</button>' +
          '<div class="group-note-body" id="groupNoteBody" style="display:none">' + escapeHtml(card.groupNote) + '</div>';
      }
    } else if (groupNoteTrim) {
      noteHtml = '<div class="answer-note">' + escapeHtml(card.groupNote) + '</div>';
    }

    const quickLetters = getQuickSelectLetters(card);
    const correctLetter = hasAnswer ? card.answerLetters.split('/')[0].trim().toLowerCase() : '';

    let frontOptionsHtml = '';
    let backOptionsHtml = '';
    if (quickLetters.length) {
      frontOptionsHtml = '<div class="option-select-row">' +
        quickLetters.map(function (l) {
          const sel = state.selectedOption === l ? ' selected' : '';
          const dis = state.selectedOption ? ' disabled' : '';
          return '<button class="option-btn' + sel + '" data-letter="' + l + '"' + dis + '>' + l.toUpperCase() + '</button>';
        }).join('') +
        '</div>';
      backOptionsHtml = '<div class="option-select-row result">' +
        quickLetters.map(function (l) {
          let cls = 'option-btn result';
          if (l === correctLetter) cls += ' correct';
          else if (l === state.selectedOption) cls += ' wrong';
          return '<button class="' + cls + '" disabled data-letter="' + l + '">' + l.toUpperCase() + '</button>';
        }).join('') +
        '</div>';
    }

    const hintText = quickLetters.length
      ? 'Scegli una risposta, clicca la card o premi Spazio'
      : 'Clicca la card o premi Spazio per vedere la risposta';

    let animClass = '';
    if (isNewCard) {
      if (direction === 'next') animClass = ' entering-next';
      else if (direction === 'prev') animClass = ' entering-prev';
      else animClass = ' entering';
    }

    el.className = 'flashcard' + (state.flipped ? ' flipped' : '') + animClass;
    el.innerHTML = '' +
      '<div class="card-face card-front">' +
        '<div class="card-meta-row">' +
          '<span class="pill pill-chapter">Cap. ' + card.chapter + ' \u00b7 ' + escapeHtml(card.groupCode) + '</span>' +
          (card.difficulty ? '<span class="pill ' + diffClass + '">' + escapeHtml(card.difficulty) + '</span>' : '') +
          '<button class="card-star-btn' + (prog.favorite ? ' active' : '') + '" id="starBtnFront" title="Preferita">' + icon('star', 18) + '</button>' +
        '</div>' +
        '<div class="card-question"><span class="qnum-badge">' + escapeHtml(card.qnum) + '</span>' + escapeHtml(card.question) + '</div>' +
        frontOptionsHtml +
        '<div class="card-hint">' + icon('sparkle', 12) + ' ' + hintText + '</div>' +
      '</div>' +
      '<div class="card-face card-back">' +
        '<div class="card-meta-row">' +
          '<span class="pill pill-chapter">' + escapeHtml(card.groupTitle) + '</span>' +
          '<button class="card-star-btn' + (prog.favorite ? ' active' : '') + '" id="starBtnBack" title="Preferita">' + icon('star', 18) + '</button>' +
        '</div>' +
        '<div class="card-answer-block">' +
          (hasAnswer ? '<div class="answer-badge"><span class="letter">' + escapeHtml(card.answerLetters.split('/')[0].trim().toUpperCase()) + '</span> Risposta corretta</div>' : '') +
          backOptionsHtml +
          noteHtml +
          toggleHtml +
        '</div>' +
      '</div>';

    // Single delegated handler assigned via property (not addEventListener) so it
    // always replaces any previous handler instead of stacking on repeated renders.
    el.onclick = handleFlashcardClick;

    syncCardHeight();

    lastCardId = id;
    const gcb = document.getElementById('gradeCorrectBtn');
    const gwb = document.getElementById('gradeWrongBtn');
    if (gcb) gcb.disabled = false;
    if (gwb) gwb.disabled = false;
    updateGradeEnabledState();
    updateGradeActiveState();
  }

  function handleFlashcardClick(e) {
    const optBtn = e.target.closest('.option-btn:not([disabled])');
    if (optBtn) {
      selectOption(optBtn.getAttribute('data-letter'));
      return;
    }
    if (e.target.closest('.card-star-btn')) {
      toggleFavoriteCurrent();
      return;
    }
    if (e.target.closest('.group-note-toggle')) {
      toggleGroupNote();
      return;
    }
    toggleFlip();
  }

  function selectOption(letter) {
    if (state.flipped || state.selectedOption) return;
    const ids = getActiveIds();
    const cardId = ids[state.activeIndex];
    const card = CARD_BY_ID[cardId];
    if (!card) return;

    state.selectedOption = letter;
    const correctLetter = (card.answerLetters || '').split('/')[0].trim().toLowerCase();
    const isCorrect = letter === correctLetter;

    document.querySelectorAll('.card-front .option-btn').forEach(function (b) {
      b.setAttribute('disabled', 'disabled');
      b.classList.toggle('selected', b.getAttribute('data-letter') === letter);
    });
    const backBtn = document.querySelector('.card-back .option-btn[data-letter="' + letter + '"]');
    if (backBtn && !isCorrect) backBtn.classList.add('wrong');

    // Answering IS grading: record progress immediately and reliably, no separate
    // manual step required. The Corretta/Sbagliata buttons remain available to
    // override afterward if needed.
    setProg(cardId, { status: isCorrect ? 'correct' : 'wrong' });
    updateGradeActiveState();
    updateChrome();
    if (isCorrect) checkChapterCompletion(cardId);
    showToast(isCorrect ? 'Corretta \u2713' : 'Sbagliata \u2014 la rivedrai');

    toggleFlip();
  }

  function updateGradeEnabledState() {
    const cb = document.getElementById('gradeCorrectBtn');
    const wb = document.getElementById('gradeWrongBtn');
    const label = document.getElementById('flipBtnLabel');
    if (label) label.textContent = state.flipped ? 'Nascondi risposta' : 'Mostra risposta';
  }

  function updateGradeActiveState() {
    const ids = getActiveIds();
    const id = ids[state.activeIndex];
    if (!id) return;
    const p = getProg(id);
    const cb = document.getElementById('gradeCorrectBtn');
    const wb = document.getElementById('gradeWrongBtn');
    const fb = document.getElementById('gradeFavBtn');
    if (cb) cb.classList.toggle('active', p.status === 'correct');
    if (wb) wb.classList.toggle('active', p.status === 'wrong');
    if (fb) fb.classList.toggle('active', !!p.favorite);
    const sf = document.getElementById('starBtnFront');
    const sb = document.getElementById('starBtnBack');
    if (sf) sf.classList.toggle('active', !!p.favorite);
    if (sb) sb.classList.toggle('active', !!p.favorite);
  }

  function updateChrome() {
    if (state.view !== 'study') return;
    const ids = getActiveIds();
    const total = ids.length;
    const idx = Math.min(state.activeIndex + 1, total);
    const progressLabel = document.getElementById('topbarProgress');
    if (progressLabel) progressLabel.innerHTML = total ? ('<b>' + idx + '</b> / ' + total) : '0 / 0';
    const fill = document.getElementById('progressFill');
    if (fill) {
      const newWidth = (total ? Math.round((idx / total) * 100) : 0) + '%';
      if (fill.style.width !== newWidth) { fill.style.width = newWidth; bumpGlow(fill); }
    }

    // refresh chip counts
    const row = document.getElementById('chipRow');
    if (row) {
      FILTERS.forEach(function (f) {
        const count = applyFilter(state.baseOrder, f.key).length;
        const chip = row.querySelector('[data-filter="' + f.key + '"] .chip-count');
        if (chip) chip.textContent = count;
      });
    }

    updateGradeActiveState();

    // sidebar chapter progress (targeted)
    if (state.scope && state.scope.type === 'chapter') {
      const s = chapterStats(state.scope.roman);
      const fillEl = document.getElementById('chapterFill-' + state.scope.roman);
      const countEl = document.getElementById('chapterCount-' + state.scope.roman);
      if (fillEl) {
        const w = s.pct + '%';
        if (fillEl.style.width !== w) { fillEl.style.width = w; bumpGlow(fillEl); }
      }
      if (countEl) countEl.textContent = s.correct + '/' + s.total;
    }
  }

  /* ============================================================
     RENDER: MAIN DISPATCH
     ============================================================ */
  function render() {
    if (state.view === 'dashboard') {
      renderDashboard();
    } else {
      renderStudyView();
    }
    const mainEl = document.getElementById('main');
    if (mainEl) mainEl.scrollTop = 0;
  }

  /* ============================================================
     COMMAND PALETTE
     ============================================================ */
  const paletteOverlay = document.getElementById('paletteOverlay');
  const paletteInput = document.getElementById('paletteInput');
  const paletteResults = document.getElementById('paletteResults');
  let paletteSelected = 0;
  let paletteMatches = [];

  function openPalette() {
    paletteOverlay.classList.add('open');
    paletteInput.value = '';
    paletteSelected = 0;
    runPaletteSearch('');
    setTimeout(function () { paletteInput.focus(); }, 30);
  }
  function closePalette() {
    paletteOverlay.classList.remove('open');
  }

  function highlightMatch(text, q) {
    if (!q) return escapeHtml(text);
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return escapeHtml(text);
    return escapeHtml(text.slice(0, idx)) + '<mark>' + escapeHtml(text.slice(idx, idx + q.length)) + '</mark>' + escapeHtml(text.slice(idx + q.length));
  }

  function runPaletteSearch(q) {
    const query = q.trim().toLowerCase();
    let results;
    if (!query) {
      results = ALL_CARDS.slice(0, 8);
    } else {
      results = ALL_CARDS.filter(function (c) {
        return c.question.toLowerCase().indexOf(query) !== -1 ||
               c.chapterTitle.toLowerCase().indexOf(query) !== -1 ||
               c.groupTitle.toLowerCase().indexOf(query) !== -1;
      }).slice(0, 30);
    }
    paletteMatches = results;
    paletteSelected = 0;
    renderPaletteResults(query);
  }

  function renderPaletteResults(query) {
    if (paletteMatches.length === 0) {
      paletteResults.innerHTML = '<div class="palette-empty">Nessun risultato per questa ricerca</div>';
      return;
    }
    paletteResults.innerHTML = paletteMatches.map(function (c, i) {
      return '' +
        '<button class="palette-item' + (i === paletteSelected ? ' selected' : '') + '" data-idx="' + i + '">' +
          '<div class="palette-item-top">' +
            '<span class="pill pill-chapter" style="font-size:10px">Cap. ' + c.chapter + '</span>' +
          '</div>' +
          '<div class="palette-item-text">' + highlightMatch(c.question, query) + '</div>' +
          '<div class="palette-item-meta">' + escapeHtml(c.chapterTitle) + ' \u00b7 ' + escapeHtml(c.groupTitle) + '</div>' +
        '</button>';
    }).join('');
    paletteResults.querySelectorAll('.palette-item').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const i = parseInt(btn.getAttribute('data-idx'), 10);
        selectPaletteResult(i);
      });
    });
  }

  function selectPaletteResult(i) {
    const c = paletteMatches[i];
    if (!c) return;
    closePalette();
    openCardDirect(c.id);
  }

  /* ============================================================
     MOBILE SIDEBAR DRAWER
     ============================================================ */
  const sidebarEl = document.getElementById('sidebarEl');
  const sidebarBackdrop = document.getElementById('sidebarBackdrop');
  const isMobileLayout = function () { return window.matchMedia('(max-width: 900px)').matches; };

  function openMobileSidebar() {
    sidebarEl.classList.add('mobile-open');
    sidebarBackdrop.classList.add('open');
  }
  function closeMobileSidebar() {
    sidebarEl.classList.remove('mobile-open');
    sidebarBackdrop.classList.remove('open');
  }
  function toggleMobileSidebar() {
    if (sidebarEl.classList.contains('mobile-open')) closeMobileSidebar();
    else openMobileSidebar();
  }

  document.getElementById('mobileMenuBtn').addEventListener('click', toggleMobileSidebar);
  document.getElementById('sidebarCloseBtn').addEventListener('click', closeMobileSidebar);
  sidebarBackdrop.addEventListener('click', closeMobileSidebar);
  document.getElementById('mobileSearchBtn').addEventListener('click', function () {
    closeMobileSidebar();
    openPalette();
  });

  document.getElementById('searchTriggerBtn').addEventListener('click', openPalette);
  paletteOverlay.addEventListener('click', function (e) {
    if (e.target === paletteOverlay) closePalette();
  });
  paletteInput.addEventListener('input', function () { runPaletteSearch(paletteInput.value); });

  /* ============================================================
     GLOBAL KEYBOARD SHORTCUTS
     ============================================================ */
  document.addEventListener('keydown', function (e) {
    const paletteOpen = paletteOverlay.classList.contains('open');
    const cmdK = (e.key === 'k' || e.key === 'K') && (e.metaKey || e.ctrlKey);

    if (cmdK) {
      e.preventDefault();
      paletteOpen ? closePalette() : openPalette();
      return;
    }

    if (paletteOpen) {
      if (e.key === 'Escape') { closePalette(); return; }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        paletteSelected = Math.min(paletteMatches.length - 1, paletteSelected + 1);
        renderPaletteResults(paletteInput.value.trim().toLowerCase());
        const sel = paletteResults.querySelector('.selected');
        if (sel) sel.scrollIntoView({ block: 'nearest' });
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        paletteSelected = Math.max(0, paletteSelected - 1);
        renderPaletteResults(paletteInput.value.trim().toLowerCase());
        const sel2 = paletteResults.querySelector('.selected');
        if (sel2) sel2.scrollIntoView({ block: 'nearest' });
        return;
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        selectPaletteResult(paletteSelected);
        return;
      }
      return;
    }

    if (e.key === 'Escape' && sidebarEl.classList.contains('mobile-open')) { closeMobileSidebar(); return; }

    if (state.view !== 'study') return;
    const active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;

    if (e.key === ' ') { e.preventDefault(); toggleFlip(); }
    else if (e.key === 'ArrowLeft') { goPrevManual(); }
    else if (e.key === 'ArrowRight') { goNextManual(); }
    else if (e.key === '1') { gradeCurrent('correct'); }
    else if (e.key === '2') { gradeCurrent('wrong'); }
    else if (e.key === 'f' || e.key === 'F') { toggleFavoriteCurrent(); }
    else if (/^[a-cA-C]$/.test(e.key)) {
      const letter = e.key.toLowerCase();
      const btn = document.querySelector('.card-front .option-btn[data-letter="' + letter + '"]:not([disabled])');
      if (btn) selectOption(letter);
    }
    else if (e.key === 'Escape') { goDashboard(); }
  });

  /* ============================================================
     NAV BAR HANDLERS
     ============================================================ */
  document.querySelectorAll('.nav-item').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const which = btn.getAttribute('data-nav');
      if (isMobileLayout()) closeMobileSidebar();
      if (which === 'dashboard') goDashboard();
      if (which === 'shuffle') openShuffle();
    });
  });

  document.getElementById('chapterList').addEventListener('click', function (e) {
    const btn = e.target.closest('[data-open-chapter]');
    if (btn) {
      if (isMobileLayout()) closeMobileSidebar();
      openChapter(btn.getAttribute('data-open-chapter'));
    }
  });

  let resizeTimer = null;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      if (state.view === 'study') syncCardHeight();
    }, 120);
  });

  /* ============================================================
     INIT
     ============================================================ */
  render();
})();

</script>

</body>
</html>
